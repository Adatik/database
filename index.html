<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Database Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#091747',
            secondary: '#324380',
          }
        }
      }
    }
    // Set dark mode from system or stored preference
    (function() {
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    th { cursor: pointer; user-select: none; }
    th:hover { background-color: rgba(0,0,0,0.05); }
    .dark th:hover { background-color: rgba(255,255,255,0.05); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.active { display: flex; }
    .column-badge { display: inline-flex; align-items: center; gap: 4px; background: #e2e8f0; border-radius: 6px; padding: 2px 8px; font-size: 0.8rem; }
    .dark .column-badge { background: #334155; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 h-screen flex transition-colors">

  <!-- Auth Container -->
  <div id="auth-container" class="w-full max-w-md mx-auto mt-20 p-6 bg-white dark:bg-gray-800 rounded-xl shadow-xl space-y-4">
    <h1 class="text-2xl font-bold text-center text-gray-800 dark:text-white">My Database</h1>
    <input type="email" id="email" placeholder="Email" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
    <input type="password" id="password" placeholder="Password" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
    <div class="flex gap-2">
      <button onclick="signUp()" class="flex-1 bg-brand text-white py-3 rounded-lg font-semibold hover:bg-secondary transition">Sign Up</button>
      <button onclick="signIn()" class="flex-1 bg-brand text-white py-3 rounded-lg font-semibold hover:bg-secondary transition">Sign In</button>
    </div>
    <p id="auth-message" class="text-sm text-red-500 text-center"></p>
  </div>

  <!-- Main App -->
  <div id="app-container" class="flex flex-1 h-screen hidden">
    <!-- Sidebar -->
    <div class="w-60 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shadow-sm">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg text-gray-800 dark:text-white">Tables</h2>
          <button onclick="openCreateTableModal()" class="bg-brand hover:bg-secondary text-white w-7 h-7 rounded-full flex items-center justify-center text-xl leading-none transition">+</button>
        </div>
        <ul id="table-list" class="space-y-1"></ul>
      </div>
      <div class="mt-auto p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
        <button onclick="toggleDarkMode()" class="w-full text-left text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 px-2 py-1 rounded" id="theme-toggle">
          🌓 Dark mode
        </button>
        <button onclick="signOut()" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 py-2 rounded-lg text-gray-600 dark:text-gray-200 font-medium transition">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between shadow-sm">
        <h1 id="current-table-name" class="text-xl font-semibold text-gray-800 dark:text-white">Select a table</h1>
        <div class="flex gap-2 flex-wrap">
          <button onclick="openPrivacyModal()" class="px-3 py-1.5 text-sm border border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">Privacy</button>
          <button onclick="openApiModal()" class="px-3 py-1.5 text-sm border border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">API</button>
          <button onclick="openWebhooksModal()" class="px-3 py-1.5 text-sm border border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">Webhooks</button>
          <button onclick="exportCSV()" class="px-3 py-1.5 text-sm bg-brand text-white rounded-lg hover:bg-secondary transition">Export CSV</button>
        </div>
      </div>

      <!-- Table Area -->
      <div class="flex-1 overflow-auto p-6">
        <div id="add-row" class="flex gap-2 mb-4 hidden flex-wrap"></div>
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden hidden" id="data-table-container">
          <table class="w-full" id="data-table">
            <thead id="table-head" class="bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-sm"></thead>
            <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
          </table>
        </div>
        <div id="no-table-selected" class="text-center text-gray-400 dark:text-gray-500 mt-16 text-lg">Select a table from the left to view its data.</div>
      </div>

      <!-- Real-Time Log -->
      <div class="border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-4 max-h-36 overflow-y-auto shadow-inner">
        <h3 class="text-sm font-semibold text-gray-500 dark:text-gray-400 mb-2">Real‑Time Change Log</h3>
        <div id="change-log" class="text-xs space-y-1 text-gray-600 dark:text-gray-300"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-5 py-3 rounded-lg shadow-lg hidden z-50 transition-all"></div>

  <!-- ============= MODALS ============= -->
  <!-- Create Table Modal -->
  <div id="create-table-modal" class="modal-overlay">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-white">Create New Table</h3>
      <input id="new-table-name" placeholder="Table name" class="w-full border p-2 rounded-lg mb-4 focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
      <div id="new-columns" class="space-y-3 mb-3"></div>
      <button onclick="addColumnField()" class="text-brand hover:text-secondary text-sm">+ Add column</button>
      <p id="create-table-error" class="text-red-500 text-sm mt-2 hidden"></p>
      <div class="flex gap-2 mt-4">
        <button onclick="createTable()" class="bg-brand text-white px-4 py-2 rounded-lg hover:bg-secondary transition flex-1">Create</button>
        <button onclick="closeModal('create-table-modal')" class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Privacy Modal -->
  <div id="privacy-modal" class="modal-overlay">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md">
      <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-white">Privacy Rules (<span id="privacy-table-name"></span>)</h3>
      <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Read rule (e.g., user_id = @user_id)</label>
      <input id="privacy-read" class="w-full border p-2 rounded-lg mb-3 focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
      <label class="block text-sm text-gray-600 dark:text-gray-300 mb-1">Write rule</label>
      <input id="privacy-write" class="w-full border p-2 rounded-lg mb-3 focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
      <div class="flex gap-2 mt-4">
        <button onclick="savePrivacy()" class="bg-brand text-white px-4 py-2 rounded-lg hover:bg-secondary transition flex-1">Save</button>
        <button onclick="closeModal('privacy-modal')" class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition">Cancel</button>
      </div>
    </div>
  </div>

  <!-- API Modal -->
  <div id="api-modal" class="modal-overlay">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md">
      <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-white">API Endpoints (<span id="api-table-name"></span>)</h3>
      <div class="space-y-2 text-sm bg-gray-50 dark:bg-gray-700 p-4 rounded-lg text-gray-700 dark:text-gray-200">
        <p><strong>GET</strong> /api/data/<span class="table-name-inline"></span></p>
        <p><strong>POST</strong> /api/data/<span class="table-name-inline"></span> (body: fields)</p>
        <p><strong>DELETE</strong> /api/data/<span class="table-name-inline"></span>/:id</p>
      </div>
      <button onclick="closeModal('api-modal')" class="mt-4 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition w-full">Close</button>
    </div>
  </div>

  <!-- Webhooks Modal -->
  <div id="webhooks-modal" class="modal-overlay">
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-md max-h-[80vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-4 text-gray-800 dark:text-white">Webhooks (<span id="webhooks-table-name"></span>)</h3>
      <div class="flex gap-2 mb-4">
        <input id="webhook-url" placeholder="URL" class="flex-1 border p-2 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
        <select id="webhook-event" class="border p-2 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white">
          <option value="insert">insert</option>
          <option value="update">update</option>
          <option value="delete">delete</option>
        </select>
        <button onclick="addWebhook()" class="bg-brand text-white px-3 py-2 rounded-lg hover:bg-secondary transition text-sm">Add</button>
      </div>
      <ul id="webhook-list" class="space-y-2 text-sm dark:text-gray-200"></ul>
      <button onclick="closeModal('webhooks-modal')" class="mt-4 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition w-full">Close</button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');
    let ws = null;
    let selectedTable = null;
    let currentColumns = [];
    let currentRows = [];
    let sortColumn = null;
    let sortAsc = true;

    // ======= DARK MODE TOGGLE =======
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        localStorage.theme = 'dark';
      }
      updateThemeToggleText();
    }
    function updateThemeToggleText() {
      document.getElementById('theme-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️ Light mode' : '🌓 Dark mode';
    }
    updateThemeToggleText();

    // Toast
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 transition-all ' + (isError ? 'bg-red-600 text-white' : 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    // ======= AUTH =======
    function showAuthMessage(msg) { document.getElementById('auth-message').textContent = msg; }
    function showAuth() {
      document.getElementById('auth-container').classList.remove('hidden');
      document.getElementById('app-container').classList.add('hidden');
    }
    function showApp() {
      document.getElementById('auth-container').classList.add('hidden');
      document.getElementById('app-container').classList.remove('hidden');
      loadTables();
      connectWebSocket();
    }

    async function handleAuthResponse(res) {
      const data = await res.json();
      if (res.ok) {
        token = data.token;
        localStorage.setItem('token', token);
        showApp();
      } else {
        showAuthMessage(data.error);
      }
    }

    async function signUp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/api/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
      });
      handleAuthResponse(res);
    }

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
      });
      handleAuthResponse(res);
    }

    function signOut() {
      localStorage.removeItem('token');
      token = null;
      if (ws) ws.close();
      showAuth();
    }

    // ======= TABLE LIST =======
    async function loadTables() {
      if (!token) return;
      const res = await fetch(`${API_BASE}/api/tables`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401) { signOut(); return; }
      const tables = await res.json();
      const list = document.getElementById('table-list');
      list.innerHTML = tables.map(t => `
        <li class="p-2 rounded-lg cursor-pointer transition flex items-center gap-2 ${selectedTable === t.name ? 'bg-brand/10 text-brand font-medium' : 'hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'}" 
            onclick="selectTable('${t.name}')">
          <span class="text-lg">📄</span> ${t.name}
        </li>
      `).join('');
    }

    async function selectTable(name) {
      selectedTable = name;
      document.getElementById('current-table-name').textContent = name;
      document.getElementById('no-table-selected').classList.add('hidden');
      document.getElementById('data-table-container').classList.remove('hidden');
      document.getElementById('add-row').classList.remove('hidden');

      const tablesRes = await fetch(`${API_BASE}/api/tables`, { headers: { 'Authorization': `Bearer ${token}` } });
      const tables = await tablesRes.json();
      const tableMeta = tables.find(t => t.name === name);
      currentColumns = tableMeta ? tableMeta.columns : [];

      const rowsRes = await fetch(`${API_BASE}/api/data/${name}`, { headers: { 'Authorization': `Bearer ${token}` } });
      currentRows = await rowsRes.json();

      renderTable();
      renderAddRowForm();
      loadTables(); // update sidebar selection
    }

    function renderTable() {
      const thead = document.getElementById('table-head');
      const tbody = document.getElementById('table-body');
      if (!selectedTable) return;
      const allCols = ['id', ...currentColumns.map(c => c.name)];
      thead.innerHTML = `<tr>${allCols.map(c => `<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider" onclick="sortTable('${c}')">${c} ${sortColumn === c ? (sortAsc ? '▲' : '▼') : '⇅'}</th>`).join('')}<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Actions</th></tr>`;
      tbody.innerHTML = currentRows.length === 0 ? `<tr><td colspan="${allCols.length+1}" class="px-4 py-6 text-center text-gray-400">No rows yet. Add one below.</td></tr>` : currentRows.map(row => `
        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
          ${allCols.map(c => `<td class="px-4 py-3 text-sm">${escapeHtml(row[c] ?? '')}</td>`).join('')}
          <td class="px-4 py-3"><button onclick="deleteRow('${row.id}')" class="text-red-500 hover:text-red-700 font-medium">Delete</button></td>
        </tr>
      `).join('');
    }

    function renderAddRowForm() {
      const formDiv = document.getElementById('add-row');
      formDiv.innerHTML = currentColumns.map(c => `
        <input placeholder="${c.name}" id="add-${c.name}" class="border p-2 rounded-lg flex-1 min-w-[120px] focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white text-sm" />
      `).join('') + `<button onclick="addRow()" class="bg-brand text-white px-4 py-2 rounded-lg hover:bg-secondary transition text-sm">Add</button>`;
    }

    // Sorting
    function sortTable(col) {
      if (sortColumn === col) sortAsc = !sortAsc;
      else { sortColumn = col; sortAsc = true; }
      currentRows.sort((a, b) => {
        const valA = a[col] || '', valB = b[col] || '';
        if (valA < valB) return sortAsc ? -1 : 1;
        if (valA > valB) return sortAsc ? 1 : -1;
        return 0;
      });
      renderTable();
    }

    // CRUD
    async function addRow() {
      const body = {};
      currentColumns.forEach(c => {
        const el = document.getElementById(`add-${c.name}`);
        if (el) body[c.name] = el.value;
      });
      const res = await fetch(`${API_BASE}/api/data/${selectedTable}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.status === 401) { signOut(); return; }
      if (res.ok) {
        selectTable(selectedTable);
        showToast('Row added');
      } else {
        const err = await res.json();
        showToast(err.error || 'Add failed', true);
      }
    }

    async function deleteRow(id) {
      if (!confirm('Permanently delete this row?')) return;
      const res = await fetch(`${API_BASE}/api/data/${selectedTable}/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { signOut(); return; }
      if (res.ok) {
        selectTable(selectedTable);
        showToast('Row deleted');
      } else showToast('Delete failed', true);
    }

    // ======= TABLE CREATION =======
    const COLUMN_TYPES = ['string', 'text', 'int', 'int8', 'integer', 'float', 'number', 'boolean', 'date', 'datetime'];

    function openCreateTableModal() {
      document.getElementById('new-table-name').value = '';
      document.getElementById('new-columns').innerHTML = '';
      document.getElementById('create-table-error').classList.add('hidden');
      addColumnField();
      document.getElementById('create-table-modal').classList.add('active');
    }

    function addColumnField() {
      const div = document.getElementById('new-columns');
      const idx = div.children.length + 1;
      div.innerHTML += `
        <div class="flex items-center gap-2">
          <input placeholder="Column name" class="column-name w-full border p-2 rounded-lg text-sm focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
          <select class="column-type border p-2 rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            ${COLUMN_TYPES.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>
          <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl">×</button>
        </div>`;
    }

    async function createTable() {
      const name = document.getElementById('new-table-name').value.trim();
      const nameInputs = document.querySelectorAll('.column-name');
      const typeSelects = document.querySelectorAll('.column-type');
      const cols = [];
      for (let i = 0; i < nameInputs.length; i++) {
        const colName = nameInputs[i].value.trim();
        if (colName) cols.push({ name: colName, type: typeSelects[i].value });
      }
      if (!name || cols.length === 0) {
        document.getElementById('create-table-error').textContent = 'Name and at least one column required.';
        document.getElementById('create-table-error').classList.remove('hidden');
        return;
      }
      const res = await fetch(`${API_BASE}/api/tables`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name, columns: cols })
      });
      if (res.status === 401) { signOut(); return; }
      const data = await res.json();
      if (res.ok) {
        closeModal('create-table-modal');
        loadTables();
        selectTable(name);
        showToast(`Table "${name}" created.`);
      } else {
        document.getElementById('create-table-error').textContent = data.error || 'Creation failed';
        document.getElementById('create-table-error').classList.remove('hidden');
      }
    }

    // ======= PRIVACY =======
    async function openPrivacyModal() {
      if (!selectedTable) return;
      const tablesRes = await fetch(`${API_BASE}/api/tables`, { headers: { 'Authorization': `Bearer ${token}` } });
      const tables = await tablesRes.json();
      const meta = tables.find(t => t.name === selectedTable);
      document.getElementById('privacy-read').value = meta?.privacy?.read || '';
      document.getElementById('privacy-write').value = meta?.privacy?.write || '';
      document.getElementById('privacy-table-name').textContent = selectedTable;
      document.getElementById('privacy-modal').classList.add('active');
    }

    async function savePrivacy() {
      const read = document.getElementById('privacy-read').value.trim();
      const write = document.getElementById('privacy-write').value.trim();
      await fetch(`${API_BASE}/api/tables/${selectedTable}/privacy`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ read, write })
      });
      closeModal('privacy-modal');
      showToast('Privacy rules saved.');
    }

    // API
    function openApiModal() {
      if (!selectedTable) return;
      document.getElementById('api-table-name').textContent = selectedTable;
      document.querySelectorAll('.table-name-inline').forEach(el => el.textContent = selectedTable);
      document.getElementById('api-modal').classList.add('active');
    }

    // Webhooks
    async function openWebhooksModal() {
      if (!selectedTable) return;
      document.getElementById('webhooks-table-name').textContent = selectedTable;
      document.getElementById('webhook-url').value = '';
      await loadWebhooks();
      document.getElementById('webhooks-modal').classList.add('active');
    }

    async function loadWebhooks() {
      const res = await fetch(`${API_BASE}/api/webhooks/${selectedTable}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const hooks = await res.json();
      document.getElementById('webhook-list').innerHTML = hooks.length === 0 ? '<li class="text-gray-400">No webhooks yet.</li>' : hooks.map(h => `
        <li class="flex justify-between items-center text-sm border-b pb-2 dark:border-gray-600">
          <span>${h.event} → ${h.url}</span>
          <button onclick="deleteWebhook(${h.id})" class="text-red-400 hover:text-red-600">✕</button>
        </li>
      `).join('');
    }

    async function addWebhook() {
      const url = document.getElementById('webhook-url').value.trim();
      const event = document.getElementById('webhook-event').value;
      if (!url) return;
      const res = await fetch(`${API_BASE}/api/webhooks/${selectedTable}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ url, event })
      });
      if (res.ok) {
        loadWebhooks();
        document.getElementById('webhook-url').value = '';
        showToast('Webhook added');
      } else showToast('Failed', true);
    }

    async function deleteWebhook(id) {
      await fetch(`${API_BASE}/api/webhooks/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      loadWebhooks();
      showToast('Webhook removed');
    }

    // Export CSV
    function exportCSV() {
      if (!selectedTable || currentRows.length === 0) {
        showToast('No data to export', true);
        return;
      }
      const cols = ['id', ...currentColumns.map(c => c.name)];
      let csv = cols.join(',') + '\n';
      currentRows.forEach(row => {
        csv += cols.map(c => `"${(row[c] || '').toString().replace(/"/g, '""')}"`).join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${selectedTable}.csv`;
      a.click();
      showToast('CSV exported');
    }

    // Real‑time WebSocket
    function connectWebSocket() {
      if (ws) ws.close();
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token }));
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'item_change') {
          const logDiv = document.getElementById('change-log');
          let message = `[${msg.table}] ${msg.event}: `;
          if (msg.event === 'update') message += `old=${JSON.stringify(msg.old)} → new=${JSON.stringify(msg.new)}`;
          else if (msg.event === 'delete') message += `old=${JSON.stringify(msg.old)}`;
          else message += `new=${JSON.stringify(msg.new)}`;
          const p = document.createElement('p');
          p.className = 'text-xs border-b pb-1 mb-1 dark:border-gray-600';
          p.textContent = message;
          logDiv.prepend(p);
          if (logDiv.children.length > 20) logDiv.removeChild(logDiv.lastChild);
          // Auto‑refresh if change affects current table
          if (msg.table === selectedTable) selectTable(selectedTable);
        }
      };
      ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }

    function escapeHtml(text) {
      return text.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    // Init
    window.addEventListener('load', () => {
      if (token) {
        showApp();
      } else {
        showAuth();
      }
    });

    // Close modals on outside click
    window.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('active');
    });
  </script>
</body>
</html>

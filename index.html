<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Database Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.active { display: flex; }
    .action-dropdown { position: absolute; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 100; min-width: 120px; display: none; }
    .dark .action-dropdown { background: #1A1F24; border-color: #374151; }
    .action-dropdown.show { display: block; }
    .user-menu { position: absolute; right: 0; top: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 10; min-width: 200px; display: none; }
    .dark .user-menu { background: #1A1F24; border-color: #374151; }
    .user-menu.show { display: block; }
    th { cursor: pointer; user-select: none; }
    th:hover { background-color: rgba(0,0,0,0.05); }
    .dark th:hover { background-color: rgba(255,255,255,0.05); }
    .drag-handle { cursor: grab; padding: 0 4px; color: #9ca3af; }
    .drag-handle:active { cursor: grabbing; }
    .dragging { opacity: 0.5; }
    .edit-popup { position: absolute; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 8px; z-index: 20; display: none; }
    .dark .edit-popup { background: #1A1F24; border-color: #374151; }
    .filter-panel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; display: none; position: absolute; right: 0; top: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 20; min-width: 320px; }
    .dark .filter-panel { background: #1A1F24; border-color: #374151; }
    select { border-color: #324380; border-radius: 6px; }
    select:focus { border-color: #091747; outline: none; }
    .webhook-item { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .dark .webhook-item { border-color: #374151; }
    table { border-radius: 12px; overflow: hidden; border-collapse: separate; border-spacing: 0; }
    #data-table-container { overflow: visible !important; }
    td { position: relative; }
    .privacy-rule-card {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      background: white;
    }
    .dark .privacy-rule-card {
      background: #1A1F24;
      border-color: #374151;
    }
    .mini-perms-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .mini-perms-table th, .mini-perms-table td { padding: 4px 8px; border: 1px solid #e2e8f0; text-align: center; font-size: 0.75rem; }
    .dark .mini-perms-table th, .dark .mini-perms-table td { border-color: #374151; }
    .mini-perms-table th { background: #F1F4F8; }
    .dark .mini-perms-table th { background: #1A1F24; }
    .opacity-70 { opacity: 0.7; }
  </style>
</head>
<body class="bg-[#F1F4F8] dark:bg-[#101213] text-[#101213] dark:text-white h-screen flex transition-colors">

  <!-- Auth Container -->
  <div id="auth-container" class="w-full max-w-md mx-auto mt-20 p-6 bg-white dark:bg-[#1A1F24] rounded-xl shadow-xl space-y-4">
    <h1 class="text-2xl font-bold text-center text-[#101213] dark:text-white">My Database</h1>
    <input type="email" id="email" placeholder="Email" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-[#091747] outline-none dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
    <input type="password" id="password" placeholder="Password" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-[#091747] outline-none dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
    <div class="flex gap-2">
      <button onclick="signUp()" class="flex-1 bg-[#091747] text-white py-3 rounded-lg font-semibold border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Sign Up</button>
      <button onclick="signIn()" class="flex-1 bg-[#091747] text-white py-3 rounded-lg font-semibold border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Sign In</button>
    </div>
    <p id="auth-message" class="text-sm text-red-500 text-center"></p>
  </div>

  <!-- Main App -->
  <div id="app-container" class="flex flex-1 h-screen hidden">
    <!-- Sidebar -->
    <div class="w-60 bg-white dark:bg-[#1A1F24] border-r border-gray-200 dark:border-gray-700 flex flex-col shadow-sm">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg text-[#101213] dark:text-white">Tables</h2>
          <button onclick="openCreateTableModal()" class="bg-[#091747] hover:bg-[#324380] text-white w-7 h-7 rounded-full flex items-center justify-center border-2 border-[#324380] transition" style="border-radius:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <ul id="table-list" class="space-y-1"></ul>
      </div>
      <div class="mt-auto p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
        <button onclick="toggleDarkMode()" class="w-full text-left text-sm text-[#57636C] dark:text-[#95A1AC] hover:bg-gray-100 dark:hover:bg-[#1A1F24] px-2 py-1 rounded" id="theme-toggle">🌓 Dark mode</button>
        <button onclick="signOut()" class="w-full bg-gray-100 dark:bg-[#1A1F24] hover:bg-gray-200 dark:hover:bg-gray-700 py-2 rounded-lg text-[#57636C] dark:text-[#95A1AC] font-medium border-2 border-[#324380] transition" style="border-radius:8px;">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <div class="bg-white dark:bg-[#1A1F24] border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between shadow-sm">
        <h1 id="current-table-name" class="text-xl font-semibold text-[#101213] dark:text-white">Select a table</h1>
        <div class="flex items-center gap-3 flex-wrap">
          <button onclick="openEditTableModal(selectedTable)" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Edit Table</button>
          <button onclick="openAddRowModal()" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Add Row</button>
          <button onclick="openPrivacyModal()" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Privacy</button>
          <button onclick="openApiModal()" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">API</button>
          <button onclick="openWebhooksModal()" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Webhooks</button>
          <button onclick="exportCSV()" class="px-3 py-1.5 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Export CSV</button>
          <div class="relative">
            <button onclick="toggleLogsModal()" class="text-[#57636C] dark:text-[#95A1AC] hover:text-[#091747] transition text-xl">🔔</button>
          </div>
          <div class="relative">
            <button id="user-menu-button" class="flex items-center space-x-2 text-[#57636C] dark:text-[#95A1AC] hover:text-[#091747] transition">
              <span class="text-xl">👤</span>
              <span id="user-email-display" class="hidden sm:inline text-sm"></span>
            </button>
            <div id="user-menu-dropdown" class="user-menu">
              <div class="p-3 border-b dark:border-gray-600">
                <p class="text-sm text-[#57636C] dark:text-[#95A1AC]">Signed in as</p>
                <p id="user-email-full" class="text-sm font-medium text-[#101213] dark:text-white truncate"></p>
              </div>
              <button onclick="signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Sign out</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Table Area -->
      <div class="flex-1 overflow-auto p-6">
        <!-- Search and Filter Bar -->
        <div class="flex items-center justify-between mb-4">
          <input type="text" id="search-input" placeholder="Search..." class="border p-2 rounded-lg w-64 focus:ring-2 focus:ring-[#091747] outline-none dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" onkeyup="applySearch()" />
          <div class="relative">
            <button onclick="toggleFilterPanel()" class="w-10 h-10 rounded-full bg-[#091747] text-white flex items-center justify-center shadow-md hover:bg-[#324380] transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3 3a1 1 0 011-1h12a1 1 0 011 1v3a1 1 0 01-.293.707L12 11.414V15a1 1 0 01-.293.707l-2 2A1 1 0 018 17v-5.586L3.293 6.707A1 1 0 013 6V3z" clip-rule="evenodd" />
              </svg>
            </button>
            <div id="filter-panel" class="filter-panel">
              <h4 class="font-medium mb-2 text-[#101213] dark:text-white">Filters</h4>
              <div id="filter-conditions" class="space-y-2 mb-3"></div>
              <button onclick="addFilterCondition()" class="text-[#57636C] dark:text-[#95A1AC] text-sm hover:underline">+ Add filter</button>
              <div class="flex gap-2 mt-3">
                <button onclick="applyFilters()" class="bg-[#091747] text-white px-4 py-1 rounded-lg text-sm border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Apply</button>
                <button onclick="clearFilters()" class="bg-gray-200 dark:bg-[#1A1F24] text-[#101213] dark:text-white px-4 py-1 rounded-lg text-sm border-2 border-[#324380] hover:bg-gray-300 dark:hover:bg-gray-600 transition" style="border-radius:8px;">Clear</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Bulk Selection Bar -->
        <div id="bulk-bar" class="flex items-center justify-between mb-2 hidden">
          <span class="text-sm text-[#57636C] dark:text-[#95A1AC]">
            <span id="selected-count">0</span> of <span id="total-row-count">0</span> rows selected
          </span>
          <div class="flex gap-2">
            <button onclick="bulkDelete()" class="px-3 py-1 text-sm bg-red-500 text-white rounded-lg border-2 border-[#324380] hover:bg-red-600 transition" style="border-radius:8px;">Delete Selected</button>
            <button onclick="openBulkEditModal()" class="px-3 py-1 text-sm bg-[#091747] text-white rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition" style="border-radius:8px;">Bulk Edit</button>
            <button onclick="bulkDuplicate()" class="px-3 py-1 text-sm bg-green-500 text-white rounded-lg border-2 border-[#324380] hover:bg-green-600 transition" style="border-radius:8px;">Duplicate Selected</button>
          </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white dark:bg-[#1A1F24] rounded-xl shadow-sm overflow-hidden hidden" id="data-table-container">
          <table class="w-full" id="data-table">
            <thead id="table-head"></thead>
            <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
          </table>
        </div>
        <div id="no-table-selected" class="text-center text-[#57636C] dark:text-[#95A1AC] mt-16 text-lg">Select a table from the left to view its data.</div>

        <!-- Pagination -->
        <div id="pagination" class="flex items-center justify-between mt-4 hidden">
          <div class="flex items-center gap-2 text-sm text-[#57636C] dark:text-[#95A1AC]">
            Show
            <select id="rows-per-page" onchange="changeRowsPerPage()" class="border p-1 rounded dark:bg-[#1A1F24] dark:text-white" style="border-color:#324380;">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            rows
          </div>
          <div class="flex items-center gap-2">
            <span class="text-sm text-[#57636C] dark:text-[#95A1AC]">
              <span id="page-start">0</span>-<span id="page-end">0</span> of <span id="total-rows">0</span>
            </span>
            <div class="flex gap-1">
              <button onclick="prevPage()" class="px-3 py-1 border-2 border-[#324380] rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-700">Previous</button>
              <span id="page-numbers" class="flex gap-1"></span>
              <button onclick="nextPage()" class="px-3 py-1 border-2 border-[#324380] rounded text-sm hover:bg-gray-100 dark:hover:bg-gray-700">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 hidden transition-all"></div>

  <!-- ============= MODALS ============= -->
  <!-- (Create Table, Edit Table, Add Row, Bulk Edit, Privacy, Webhooks, API Docs, Logs, Delete, Rename – all identical to last version, except Privacy modal is updated below) -->

  <!-- Privacy Modal (with custom value option) -->
  <div id="privacy-modal" class="modal-overlay">
    <div class="bg-white dark:bg-[#1A1F24] p-6 rounded-xl shadow-2xl w-full max-w-7xl max-h-[90vh] overflow-y-auto">
      <h3 class="text-lg font-bold mb-4 text-[#101213] dark:text-white">Privacy & Permissions for <span id="privacy-table-name"></span></h3>
      <div id="privacy-rules-container" class="space-y-4"></div>
      <button onclick="addPrivacyRuleCard()" class="mt-2 text-[#57636C] dark:text-[#95A1AC] text-sm">+ Add rule</button>
      <div class="flex gap-2 mt-4">
        <button onclick="savePrivacyRules()" class="bg-[#091747] text-white px-4 py-2 rounded-lg border-2 border-[#324380] hover:bg-[#324380] transition flex-1" style="border-radius:8px;">Save Rules</button>
        <button onclick="closeModal('privacy-modal')" class="bg-gray-200 dark:bg-[#1A1F24] text-[#101213] dark:text-white px-4 py-2 rounded-lg border-2 border-[#324380] hover:bg-gray-300 dark:hover:bg-gray-600 transition" style="border-radius:8px;">Cancel</button>
      </div>
    </div>
  </div>

   <script>
    // ================ GLOBALS ================
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');
    let ws = null;
    let selectedTable = localStorage.getItem('selectedTable') || null;
    let currentColumns = [];
    let currentRows = [];
    let allTables = [];
    let sortColumn = null;
    let sortAsc = true;
    let tableToDelete = null;
    let tableToRename = null;
    const COLUMN_TYPES = ['string','text','int','int8','integer','float','number','boolean','date','datetime'];
    const OPERATORS = ['eq','neq','gt','lt','gte','lte','contains','not_contains'];
    const OPERATOR_LABELS = { eq:'Equal', neq:'Not equal', gt:'Greater than', lt:'Less than', gte:'Greater than or equal', lte:'Less than or equal', contains:'Contains', not_contains:'Does not contain' };
    const TYPE_OPERATORS = {
      string: ['eq','neq','contains','not_contains'],
      text: ['eq','neq','contains','not_contains'],
      int: ['eq','neq','gt','lt','gte','lte'],
      int8: ['eq','neq','gt','lt','gte','lte'],
      integer: ['eq','neq','gt','lt','gte','lte'],
      float: ['eq','neq','gt','lt','gte','lte'],
      number: ['eq','neq','gt','lt','gte','lte'],
      boolean: ['eq','neq'],
      date: ['eq','neq','gt','lt','gte','lte'],
      datetime: ['eq','neq','gt','lt','gte','lte']
    };
    let privacyRules = [];
    let showRealToken = false;
    let currentPage = 1;
    let rowsPerPage = 10;
    let totalRows = 0;
    let activeFilters = [];
    let webhookHeaders = [];
    let selectedRows = new Set();
    let anonKeyValue = '...';
    let adminKeyValue = '...';

    // ======= DARK MODE =======
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        localStorage.theme = 'dark';
      }
      document.getElementById('theme-toggle').textContent = 
        html.classList.contains('dark') ? '☀️ Light mode' : '🌓 Dark mode';
    }

    // Toast
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 transition-all ' + 
        (isError ? 'bg-red-600 text-white' : 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    // ======= AUTH (same as before) =======
    // ... (include all auth functions, table list, drag, select, render, bulk, etc. – identical to previous full version)

    // ======= SEARCH & FILTER (identical to previous) =======
    function applySearch() {
      const query = document.getElementById('search-input').value.trim();
      if (query && currentColumns.length > 0) {
        activeFilters = [{ column: currentColumns[0]?.name || 'title', operator: 'contains', value: query }];
      } else {
        activeFilters = [];
      }
      currentPage = 1;
      fetchAndRenderRows();
    }

    // ======= PRIVACY (custom value dropdown) =======
    function openPrivacyModal() {
      if (!selectedTable) return;
      document.getElementById('privacy-table-name').textContent = selectedTable;
      const table = allTables.find(t => t.name === selectedTable);
      const priv = table?.privacy || {};
      privacyRules = [];
      const ops = ['read', 'write', 'update', 'delete'];
      ops.forEach(op => {
        if (priv[op]) {
          priv[op].split(' AND ').map(s => s.trim()).forEach(condition => {
            if (!privacyRules.find(r => r.condition === condition)) {
              privacyRules.push({
                condition,
                columns: { read: [], write: [], update: [], delete: [] }
              });
            }
          });
        }
      });
      const colPerms = table?.column_permissions || {};
      privacyRules.forEach(rule => {
        rule.columns = {
          read: colPerms.read ? [...colPerms.read] : [...currentColumns.map(c=>c.name), 'id'],
          write: colPerms.write ? [...colPerms.write] : [...currentColumns.map(c=>c.name), 'id'],
          update: colPerms.update ? [...colPerms.update] : [...currentColumns.map(c=>c.name), 'id'],
          delete: colPerms.delete ? [...colPerms.delete] : []
        };
      });
      if (privacyRules.length === 0) {
        privacyRules.push({
          condition: `${currentColumns[0]?.name || 'id'} eq @user_id`,
          columns: {
            read: [...currentColumns.map(c=>c.name), 'id'],
            write: [...currentColumns.map(c=>c.name), 'id'],
            update: [...currentColumns.map(c=>c.name), 'id'],
            delete: []
          }
        });
      }
      renderPrivacyCards();
      document.getElementById('privacy-modal').classList.add('active');
    }

    function renderPrivacyCards() {
      const container = document.getElementById('privacy-rules-container');
      const allCols = ['id', ...currentColumns.map(c => c.name)];
      container.innerHTML = privacyRules.map((rule, idx) => {
        const allRead = allCols.every(c => rule.columns.read.includes(c));
        const allWrite = allCols.every(c => rule.columns.write.includes(c));
        const allUpdate = allCols.every(c => rule.columns.update.includes(c));
        const allDelete = allCols.every(c => rule.columns.delete.includes(c));

        // Build options for value dropdown: @user_id, other table columns, and a "Custom…" option
        const valueOptions = [
          '@user_id',
          ...allTables.filter(t => t.name !== selectedTable).flatMap(t => t.columns.map(c => `${t.name}.${c.name}`))
        ];
        const currentValue = rule.condition.split(' ').slice(2).join(' ') || '';
        const isCustom = !valueOptions.includes(currentValue) && currentValue !== '';

        return `
        <div class="privacy-rule-card">
          <div class="flex items-center gap-2 mb-3">
            <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white flex-1" onchange="updatePrivacyCondition(${idx}, this)" style="border-color:#324380;">
              ${allCols.map(c => `<option value="${c}" ${rule.condition.startsWith(c) ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" style="border-color:#324380;" onchange="updatePrivacyOperator(${idx}, this.value)">
              ${(TYPE_OPERATORS[currentColumns.find(c => rule.condition.startsWith(c))?.type] || OPERATORS).map(o => `<option value="${o}" ${rule.condition.split(' ')[1] === o ? 'selected' : ''}>${OPERATOR_LABELS[o] || o}</option>`).join('')}
            </select>
            <div class="flex-1 flex gap-1">
              <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white flex-1" onchange="handlePrivacyValueChange(${idx}, this.value)" style="border-color:#324380;" id="privacy-value-select-${idx}">
                ${valueOptions.map(v => `<option value="${v}" ${currentValue === v ? 'selected' : ''}>${v}</option>`).join('')}
                <option value="__custom__" ${isCustom ? 'selected' : ''}>Custom value…</option>
              </select>
              <input class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white flex-1 ${isCustom ? '' : 'hidden'}" 
                     id="privacy-value-input-${idx}" 
                     value="${isCustom ? currentValue : ''}" 
                     placeholder="Type custom value"
                     onchange="updatePrivacyValue(${idx}, this.value)" 
                     style="border-color:#324380;" />
            </div>
            <button onclick="deletePrivacyRule(${idx})" class="text-red-400 hover:text-red-600">✕</button>
          </div>
          <table class="mini-perms-table">
            <thead>
              <tr>
                <th>Column</th>
                <th>Read <input type="checkbox" onchange="checkAllPerms(this, 'read', ${idx})" ${allRead ? 'checked' : ''}></th>
                <th>Write <input type="checkbox" onchange="checkAllPerms(this, 'write', ${idx})" ${allWrite ? 'checked' : ''}></th>
                <th>Update <input type="checkbox" onchange="checkAllPerms(this, 'update', ${idx})" ${allUpdate ? 'checked' : ''}></th>
                <th class="opacity-70">Delete <input type="checkbox" onchange="checkAllPerms(this, 'delete', ${idx})" ${allDelete ? 'checked' : ''}></th>
              </tr>
            </thead>
            <tbody>
              ${allCols.map(c => `
                <tr>
                  <td>${c}</td>
                  <td><input type="checkbox" ${rule.columns.read.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','read',${idx}, this.checked)"></td>
                  <td><input type="checkbox" ${rule.columns.write.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','write',${idx}, this.checked)"></td>
                  <td><input type="checkbox" ${rule.columns.update.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','update',${idx}, this.checked)"></td>
                  <td class="opacity-70"><input type="checkbox" ${rule.columns.delete.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','delete',${idx}, this.checked)"></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
      }).join('');

      // After rendering, initialize custom value visibility
      privacyRules.forEach((rule, idx) => {
        const selectEl = document.getElementById(`privacy-value-select-${idx}`);
        if (selectEl) handlePrivacyValueChange(idx, selectEl.value);
      });
    }

    function handlePrivacyValueChange(idx, value) {
      const inputEl = document.getElementById(`privacy-value-input-${idx}`);
      if (value === '__custom__') {
        if (inputEl) {
          inputEl.classList.remove('hidden');
          inputEl.focus();
        }
      } else {
        if (inputEl) inputEl.classList.add('hidden');
        updatePrivacyValue(idx, value);
      }
    }

    // (rest of the privacy functions are identical to last version)
    function checkAllPerms(cb, op, idx) {
      const allCols = ['id', ...currentColumns.map(c => c.name)];
      allCols.forEach(col => toggleRuleColumn(col, op, idx, cb.checked));
      renderPrivacyCards();
    }

    function addPrivacyRuleCard() {
      const defaultCol = currentColumns[0]?.name || 'id';
      privacyRules.push({
        condition: `${defaultCol} eq @user_id`,
        columns: {
          read: [...currentColumns.map(c=>c.name), 'id'],
          write: [...currentColumns.map(c=>c.name), 'id'],
          update: [...currentColumns.map(c=>c.name), 'id'],
          delete: []
        }
      });
      renderPrivacyCards();
    }

    function toggleRuleColumn(col, op, idx, checked) {
      const arr = privacyRules[idx].columns[op];
      if (checked) { if (!arr.includes(col)) arr.push(col); }
      else { privacyRules[idx].columns[op] = arr.filter(c => c !== col); }
    }

    function updatePrivacyCondition(idx, selectEl) {
      const parts = privacyRules[idx].condition.split(' ');
      parts[0] = selectEl.value;
      privacyRules[idx].condition = parts.join(' ');
    }

    function updatePrivacyOperator(idx, op) {
      const parts = privacyRules[idx].condition.split(' ');
      parts[1] = op;
      privacyRules[idx].condition = parts.join(' ');
    }

    function updatePrivacyValue(idx, value) {
      const parts = privacyRules[idx].condition.split(' ');
      parts[2] = value;
      privacyRules[idx].condition = parts.join(' ');
    }

    function deletePrivacyRule(idx) { privacyRules.splice(idx,1); renderPrivacyCards(); }

    async function savePrivacyRules() {
      const payload = { read: '', write: '', update: '', delete: '', column_permissions: { read: [], write: [], update: [], delete: [] } };
      ['read','write','update','delete'].forEach(op => {
        payload[op] = privacyRules.filter(r => r.columns[op].length > 0).map(r => r.condition).join(' AND ');
      });
      const globalCols = { read: new Set(), write: new Set(), update: new Set(), delete: new Set() };
      privacyRules.forEach(rule => {
        ['read','write','update','delete'].forEach(op => {
          rule.columns[op].forEach(c => globalCols[op].add(c));
        });
      });
      payload.column_permissions = {
        read: Array.from(globalCols.read),
        write: Array.from(globalCols.write),
        update: Array.from(globalCols.update),
        delete: Array.from(globalCols.delete)
      };
      await fetch(`${API_BASE}/api/tables/${selectedTable}/privacy`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(payload)
      });
      closeModal('privacy-modal');
      loadAllTables();
      showToast('Privacy rules saved');
    }

    // ======= API DOCS (same as before, working) =======
    // ... (unchanged)

    // ======= WEBOOKS (same, now works because column exists) =======
    // ... (unchanged)

    // ======= LOGS, EXPORT CSV, WEBSOCKET, HELPERS (unchanged) =======
  </script>
</body>

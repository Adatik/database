<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Database Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    /* ... same styles as before ... */
  </style>
</head>
<body class="bg-[#F1F4F8] dark:bg-[#101213] text-[#101213] dark:text-white h-screen flex transition-colors">
  <!-- Auth Container ... -->
  <!-- Main App ... -->
  <!-- All modals ... -->

  <!-- API Docs Modal (updated) -->
  <div id="api-modal" class="modal-overlay">
    <div class="bg-white dark:bg-[#1A1F24] p-6 rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-[#101213] dark:text-white">API Documentation – <span id="api-table-name"></span></h3>
        <div class="flex items-center gap-2">
          <button onclick="toggleApiToken()" class="text-xs brand-btn px-2 py-1 rounded">Show keys</button>
          <button onclick="closeModal('api-modal')" class="text-[#57636C] dark:text-[#95A1AC] hover:text-[#101213] dark:hover:text-white text-xl">✕</button>
        </div>
      </div>
      <div id="api-content" class="space-y-6"></div>
    </div>
  </div>
  <script>
    // ================ GLOBALS ================
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');
    let activeProjectId = localStorage.getItem('activeProjectId') || null;
    let ws = null;
    let selectedTable = localStorage.getItem('selectedTable') || null;
    let currentColumns = [];
    let currentRows = [];
    let allTables = [];
    let sortColumn = null;
    let sortAsc = true;
    let tableToDelete = null;
    let tableToRename = null;
    const COLUMN_TYPES = ['string','text','int','int8','integer','float','number','boolean','date','datetime'];
    const OPERATORS = ['eq','neq','gt','lt','gte','lte','contains','not_contains'];
    const OPERATOR_LABELS = { eq:'Equal', neq:'Not equal', gt:'Greater than', lt:'Less than', gte:'Greater than or equal', lte:'Less than or equal', contains:'Contains', not_contains:'Does not contain' };
    const TYPE_OPERATORS = {
      string: ['eq','neq','contains','not_contains'],
      text: ['eq','neq','contains','not_contains'],
      int: ['eq','neq','gt','lt','gte','lte'],
      int8: ['eq','neq','gt','lt','gte','lte'],
      integer: ['eq','neq','gt','lt','gte','lte'],
      float: ['eq','neq','gt','lt','gte','lte'],
      number: ['eq','neq','gt','lt','gte','lte'],
      boolean: ['eq','neq'],
      date: ['eq','neq','gt','lt','gte','lte'],
      datetime: ['eq','neq','gt','lt','gte','lte']
    };
    let privacyRules = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let totalRows = 0;
    let activeFilters = [];
    let authFilters = [];
    let webhookHeaders = [];
    let selectedRows = new Set();
    let anonKeyValue = '...';
    let adminKeyValue = '...';
    let webhookEditingId = null;

    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        localStorage.theme = 'dark';
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 transition-all ' + 
        (isError ? 'bg-red-600 text-white' : 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900');
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function showAuthMessage(msg) { document.getElementById('auth-message').textContent = msg; }

    function showAuth() {
      document.getElementById('auth-container').classList.remove('hidden');
      document.getElementById('app-container').classList.add('hidden');
    }

    async function showApp() {
      document.getElementById('auth-container').classList.add('hidden');
      document.getElementById('app-container').classList.remove('hidden');
      const email = getUserEmail();
      document.getElementById('user-email-display').textContent = email;
      document.getElementById('user-email-full').textContent = email;
      await loadProjects();
      connectWebSocket();
      switchView('projects');
    }

    function getUserEmail() {
      if (!token) return '';
      try { return JSON.parse(atob(token.split('.')[1])).email || ''; } catch { return ''; }
    }

    function clearAllState() {
      localStorage.removeItem('token');
      localStorage.removeItem('activeProjectId');
      localStorage.removeItem('selectedTable');
      token = null;
      activeProjectId = null;
      selectedTable = null;
      allTables = [];
      currentColumns = [];
      currentRows = [];
      sortColumn = null;
      sortAsc = true;
      activeFilters = [];
      authFilters = [];
      selectedRows.clear();
      currentPage = 1;
      totalRows = 0;
      if (ws) { ws.close(); ws = null; }
    }

    function signOut() {
      clearAllState();
      showAuth();
    }

    window.addEventListener('load', async () => {
      const configRes = await fetch(`${API_BASE}/api/platform/config`);
      const config = await configRes.json();
      if (config.allowSignup) {
        document.getElementById('signup-btn').classList.remove('hidden');
      }
      if (token) showApp();
    });

    async function signUp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAuthMessage('Please fill in both fields.'); return; }
      try {
        const res = await fetch(`${API_BASE}/api/platform/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          showAuthMessage('');
          showApp();
        } else {
          showAuthMessage(data.error || 'Registration failed.');
        }
      } catch (err) { showAuthMessage('Network error.'); }
    }

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showAuthMessage('Please fill in both fields.'); return; }
      try {
        const res = await fetch(`${API_BASE}/api/platform/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          localStorage.setItem('token', token);
          showAuthMessage('');
          showApp();
        } else {
          showAuthMessage(data.error || 'Invalid credentials.');
        }
      } catch (err) { showAuthMessage('Network error.'); }
    }

    document.addEventListener('click', function(e) {
      const menu = document.getElementById('user-menu-dropdown');
      const btn = document.getElementById('user-menu-button');
      if (!btn.contains(e.target) && !menu.contains(e.target)) menu.classList.remove('show');
    });
    document.getElementById('user-menu-button').addEventListener('click', function(e) {
      e.stopPropagation();
      document.getElementById('user-menu-dropdown').classList.toggle('show');
    });

    // ======= PROJECT MANAGEMENT =======
    async function loadProjects() {
      if (!token) return;
      const res = await fetch(`${API_BASE}/api/platform/projects`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const projects = await res.json();
      if (projects.length > 0) {
        if (!activeProjectId || !projects.find(p => p.id == activeProjectId)) {
          activeProjectId = projects[0].id;
          localStorage.setItem('activeProjectId', activeProjectId);
        }
      } else {
        activeProjectId = null;
        localStorage.removeItem('activeProjectId');
      }
      loadProjectsGrid();
    }

    function openProjectModal(editId = null) {
      document.getElementById('edit-project-id').value = editId || '';
      document.getElementById('project-name').value = '';
      document.getElementById('project-description').value = '';
      if (editId) {
        fetch(`${API_BASE}/api/platform/projects`, { headers: { 'Authorization': `Bearer ${token}` } })
          .then(r => r.json())
          .then(projects => {
            const proj = projects.find(p => p.id == editId);
            if (proj) {
              document.getElementById('project-name').value = proj.name;
              document.getElementById('project-description').value = proj.description || '';
              document.getElementById('project-modal-title').textContent = 'Edit Project';
            }
          });
      } else {
        document.getElementById('project-modal-title').textContent = 'Create Project';
      }
      document.getElementById('project-modal').classList.add('active');
    }

    function editProject(id) { openProjectModal(id); }

    async function saveProject() {
      const id = document.getElementById('edit-project-id').value;
      const name = document.getElementById('project-name').value.trim();
      const description = document.getElementById('project-description').value.trim();
      if (!name) return showToast('Project name required', true);
      const url = id ? `${API_BASE}/api/platform/projects/${id}` : `${API_BASE}/api/platform/projects`;
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name, description })
      });
      if (res.ok) {
        closeModal('project-modal');
        loadProjects();
        showToast(id ? 'Project updated' : 'Project created');
      } else {
        const err = await res.json();
        showToast(err.error || 'Failed', true);
      }
    }

    function loadProjectsGrid() {
      fetch(`${API_BASE}/api/platform/projects`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(projects => {
          const grid = document.getElementById('projects-grid');
          grid.innerHTML = projects.map(p => {
            const initial = (p.name || 'P')[0].toUpperCase();
            return `
              <div class="project-card">
                <div class="flex items-center gap-4">
                  <div class="project-avatar">${initial}</div>
                  <div class="flex-1">
                    <h3 class="font-semibold text-lg">${escapeHtml(p.name)}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">${escapeHtml(p.description || 'No description')}</p>
                  </div>
                </div>
                <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mt-2">
                  <span>📅 ${new Date(p.created_at).toLocaleDateString()}</span>
                  <span>📊 ${p.table_count || 0} tables</span>
                  <span>👥 ${p.user_count || 0} users</span>
                </div>
                <div class="flex gap-2 mt-2">
                  <button onclick="enterProject(${p.id})" class="flex-1 brand-btn py-1 rounded text-sm">Open</button>
                  <button onclick="editProject(${p.id})" class="brand-outline-btn px-3 py-1 rounded text-sm">✏️</button>
                  <button onclick="promptDeleteProject(${p.id})" class="text-red-500 hover:text-red-700 text-sm" title="Delete">🗑️</button>
                </div>
              </div>`;
          }).join('');
          if (projects.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-full text-center">No projects yet. Create your first project.</p>';
          }
        });
    }

    function promptDeleteProject(projectId) {
      document.getElementById('delete-project-id').value = projectId;
      document.getElementById('delete-project-password').value = '';
      document.getElementById('delete-project-error').classList.add('hidden');
      document.getElementById('delete-project-modal').classList.add('active');
    }

    async function confirmDeleteProject() {
      const projectId = document.getElementById('delete-project-id').value;
      const password = document.getElementById('delete-project-password').value;
      if (!password) {
        document.getElementById('delete-project-error').textContent = 'Password required';
        document.getElementById('delete-project-error').classList.remove('hidden');
        return;
      }
      const res = await fetch(`${API_BASE}/api/platform/projects/${projectId}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ password })
      });
      if (res.ok) {
        closeModal('delete-project-modal');
        if (activeProjectId == projectId) {
          activeProjectId = null;
          localStorage.removeItem('activeProjectId');
          selectedTable = null;
          localStorage.removeItem('selectedTable');
        }
        loadProjects();
        showToast('Project deleted');
      } else {
        const err = await res.json();
        document.getElementById('delete-project-error').textContent = err.error || 'Failed to delete';
        document.getElementById('delete-project-error').classList.remove('hidden');
      }
    }

    function enterProject(projectId) {
      activeProjectId = projectId;
      localStorage.setItem('activeProjectId', projectId);
      switchView('database');
    }

    // ======= NAVIGATION =======
    function switchView(view) {
      const navProjects = document.getElementById('nav-projects');
      const navDatabase = document.getElementById('nav-database');
      const navAuth = document.getElementById('nav-auth');
      const projectsActions = document.getElementById('projects-actions');
      const databaseActions = document.getElementById('database-actions');
      const authActions = document.getElementById('auth-actions');
      const projectGrid = document.getElementById('project-grid-area');
      const databaseArea = document.getElementById('database-table-area');
      const authArea = document.getElementById('auth-table-area');
      const sidebar = document.getElementById('content-sidebar');

      navProjects.classList.remove('active');
      navDatabase.classList.remove('active');
      navAuth.classList.remove('active');
      projectsActions.classList.add('hidden');
      databaseActions.classList.add('hidden');
      authActions.classList.add('hidden');
      projectGrid.classList.add('hidden');
      databaseArea.classList.add('hidden');
      authArea.classList.add('hidden');
      sidebar.classList.add('hidden');

      if (view === 'projects') {
        navProjects.classList.add('active');
        projectsActions.classList.remove('hidden');
        projectGrid.classList.remove('hidden');
        document.getElementById('current-table-name').textContent = 'Projects';
        loadProjectsGrid();
      } else if (view === 'database') {
        navDatabase.classList.add('active');
        databaseActions.classList.remove('hidden');
        databaseArea.classList.remove('hidden');
        sidebar.classList.remove('hidden');
        loadAllTables().then(() => {
          if (selectedTable && allTables.some(t => t.name === selectedTable)) {
            selectTable(selectedTable);
          } else if (allTables.length > 0) {
            selectTable(allTables[0].name);
          } else {
            document.getElementById('current-table-name').textContent = 'Select a table';
            document.getElementById('no-table-selected').classList.remove('hidden');
            document.getElementById('data-table-container').classList.add('hidden');
            document.getElementById('pagination').classList.add('hidden');
          }
        });
      } else if (view === 'auth') {
        navAuth.classList.add('active');
        authActions.classList.remove('hidden');
        authArea.classList.remove('hidden');
        sidebar.classList.remove('hidden');
        document.getElementById('current-table-name').textContent = 'Authentication';
        loadUsersTable();
      }
    }

    // ======= AUTHENTICATION (PROJECT USERS) =======
    async function loadUsersTable() {
      if (!activeProjectId) return;
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/users`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return showToast('Failed to load users', true);
      let users = await res.json();

      const searchTerm = document.getElementById('auth-search-input')?.value.trim().toLowerCase();
      if (searchTerm) {
        users = users.filter(u => Object.values(u).some(v => v !== null && v !== undefined && v.toString().toLowerCase().includes(searchTerm)));
      }
      authFilters.forEach(f => {
        users = users.filter(u => {
          const val = u[f.column];
          if (val === null || val === undefined) return false;
          const strVal = val.toString().toLowerCase();
          const filterVal = f.value.toLowerCase();
          switch (f.operator) {
            case 'eq': return strVal === filterVal;
            case 'neq': return strVal !== filterVal;
            case 'gt': return !isNaN(val) && Number(val) > Number(filterVal);
            case 'lt': return !isNaN(val) && Number(val) < Number(filterVal);
            case 'gte': return !isNaN(val) && Number(val) >= Number(filterVal);
            case 'lte': return !isNaN(val) && Number(val) <= Number(filterVal);
            case 'contains': return strVal.includes(filterVal);
            case 'not_contains': return !strVal.includes(filterVal);
            default: return true;
          }
        });
      });

      const usersMeta = allTables.find(t => t.name === 'users');
      const customCols = usersMeta ? usersMeta.columns.filter(c => c.name !== 'email' && c.name !== 'password' && c.name !== 'id') : [];

      const thead = document.getElementById('users-table-head');
      thead.innerHTML = `<tr class="bg-[#091747] text-white text-sm">
        <th class="px-4 py-3 text-left">ID</th>
        <th class="px-4 py-3 text-left">Email</th>
        ${customCols.map(c => `<th class="px-4 py-3 text-left">${c.name}</th>`).join('')}
        <th class="px-4 py-3 text-center">Actions</th>
      </tr>`;

      const tbody = document.getElementById('users-table-body');
      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="${3 + customCols.length}" class="px-4 py-6 text-center text-[#57636C] dark:text-[#95A1AC]">No users yet.</td></tr>`;
      } else {
        tbody.innerHTML = users.map(u => `
          <tr class="border dark:border-gray-600">
            <td class="px-4 py-2 text-sm">${u.id}</td>
            <td class="px-4 py-2 text-sm">${escapeHtml(u.email)}</td>
            ${customCols.map(c => `<td class="px-4 py-2 text-sm">${escapeHtml(u[c.name] ?? '')}</td>`).join('')}
            <td class="px-4 py-2 text-center">
              <button onclick="openEditUserModal(${u.id}, '${escapeHtml(u.email)}')" class="text-blue-500 hover:text-blue-700 text-sm mr-2">✏️</button>
              <button onclick="deleteUser(${u.id})" class="text-red-500 hover:text-red-700 text-sm">Delete</button>
            </td>
          </tr>
        `).join('');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/users/${id}`, {
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) { loadUsersTable(); showToast('User deleted'); }
      else showToast('Failed', true);
    }

    function openAddUserModal() {
      document.getElementById('new-user-email').value = '';
      document.getElementById('new-user-password').value = '';
      document.getElementById('add-user-modal').classList.add('active');
    }

    async function addUser() {
      if (!activeProjectId) return showToast('No project selected', true);
      const email = document.getElementById('new-user-email').value.trim();
      const password = document.getElementById('new-user-password').value;
      if (!email || !password) return showToast('Email and password required', true);
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ email, password })
      });
      if (res.ok) {
        closeModal('add-user-modal');
        loadUsersTable();
        showToast('User added');
      } else {
        const data = await res.json();
        showToast(data.error || 'Failed', true);
      }
    }

    function openEditUserModal(id, email) {
      document.getElementById('edit-user-id').value = id;
      document.getElementById('edit-user-email').value = email;
      document.getElementById('edit-user-password').value = '';
      const usersMeta = allTables.find(t => t.name === 'users');
      const customCols = usersMeta ? usersMeta.columns.filter(c => c.name !== 'email' && c.name !== 'password' && c.name !== 'id') : [];
      let container = document.getElementById('edit-user-modal').querySelector('.custom-fields-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'custom-fields-container space-y-3 mt-3';
        document.getElementById('edit-user-modal').querySelector('.space-y-3').appendChild(container);
      }
      container.innerHTML = customCols.map(c => `
        <input placeholder="${c.name}" id="edit-user-${c.name}" class="w-full border p-2 rounded dark:bg-[#1A1F24] dark:text-white" value="" />
      `).join('');
      fetch(`${API_BASE}/api/project/${activeProjectId}/users/${id}`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(user => {
          customCols.forEach(c => {
            const el = document.getElementById(`edit-user-${c.name}`);
            if (el) el.value = user[c.name] || '';
          });
        }).catch(() => {});
      document.getElementById('edit-user-modal').classList.add('active');
    }

    async function saveEditUser() {
      if (!activeProjectId) return showToast('No project selected', true);
      const id = document.getElementById('edit-user-id').value;
      const email = document.getElementById('edit-user-email').value.trim();
      const password = document.getElementById('edit-user-password').value;
      const body = { email };
      if (password) body.password = password;
      const usersMeta = allTables.find(t => t.name === 'users');
      const customCols = usersMeta ? usersMeta.columns.filter(c => c.name !== 'email' && c.name !== 'password' && c.name !== 'id') : [];
      customCols.forEach(c => {
        const el = document.getElementById(`edit-user-${c.name}`);
        if (el) body[c.name] = el.value;
      });
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/users/${id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        closeModal('edit-user-modal');
        loadUsersTable();
        showToast('User updated');
      } else {
        const data = await res.json();
        showToast(data.error || 'Failed', true);
      }
    }

    function applyAuthSearch() { loadUsersTable(); }
    function toggleAuthFilterPanel() {
      const panel = document.getElementById('auth-filter-panel');
      if (panel.style.display === 'block') {
        panel.style.display = 'none';
      } else {
        panel.style.display = 'block';
        renderAuthFilterConditions();
      }
    }
    function renderAuthFilterConditions() {
      const container = document.getElementById('auth-filter-conditions');
      const usersMeta = allTables.find(t => t.name === 'users');
      const columns = usersMeta ? usersMeta.columns.filter(c => c.name !== 'password') : [];
      container.innerHTML = authFilters.map((f, i) => {
        const colMeta = columns.find(c => c.name === f.column);
        const type = colMeta ? colMeta.type : 'string';
        const allowedOps = TYPE_OPERATORS[type] || TYPE_OPERATORS.string;
        return `<div class="flex items-center gap-2">
          <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" onchange="updateAuthFilterColumn(${i}, this.value)">
            ${columns.map(c => `<option value="${c.name}" ${f.column === c.name ? 'selected' : ''}>${c.name}</option>`).join('')}
          </select>
          <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" onchange="updateAuthFilterOp(${i}, this.value)">
            ${allowedOps.map(o => `<option value="${o}" ${f.operator === o ? 'selected' : ''}>${OPERATOR_LABELS[o] || o}</option>`).join('')}
          </select>
          <input value="${f.value}" class="border p-1 rounded text-sm flex-1 dark:bg-[#1A1F24] dark:text-white" onchange="updateAuthFilterValue(${i}, this.value)" />
          <button onclick="removeAuthFilterCondition(${i})" class="text-red-400 hover:text-red-600">✕</button>
        </div>`;
      }).join('');
    }
    function updateAuthFilterColumn(idx, col) { authFilters[idx].column = col; renderAuthFilterConditions(); }
    function updateAuthFilterOp(idx, op) { authFilters[idx].operator = op; }
    function updateAuthFilterValue(idx, val) { authFilters[idx].value = val; }
    function addAuthFilterCondition() {
      const usersMeta = allTables.find(t => t.name === 'users');
      const firstCol = usersMeta ? usersMeta.columns.filter(c => c.name !== 'password')[0]?.name || 'email' : 'email';
      authFilters.push({ column: firstCol, operator: 'eq', value: '' });
      renderAuthFilterConditions();
    }
    function removeAuthFilterCondition(idx) { authFilters.splice(idx, 1); renderAuthFilterConditions(); }
    function applyAuthFilters() {
      loadUsersTable();
      document.getElementById('auth-filter-panel').style.display = 'none';
    }
    function clearAllAuthFilters() {
      authFilters = [];
      document.getElementById('auth-search-input').value = '';
      renderAuthFilterConditions();
      loadUsersTable();
    }

    // ======= TABLE LIST & DATA =======
    async function loadAllTables() {
      if (!token || !activeProjectId) return;
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/tables`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { signOut(); return; }
      allTables = await res.json();
      renderTableList();
    }

    function renderTableList() {
      const list = document.getElementById('table-list');
      list.innerHTML = allTables.map(t => `
        <li class="group flex items-center justify-between p-2 rounded-lg cursor-pointer transition ${selectedTable === t.name ? 'bg-[#091747]/10 font-bold' : 'hover:bg-gray-100 dark:hover:bg-[#1A1F24] text-[#101213] dark:text-white'}" 
            onclick="selectTable('${t.name}')">
          <span class="flex-1 truncate">📄 ${t.name}</span>
          <div class="hidden group-hover:flex items-center space-x-1">
            <button onclick="event.stopPropagation(); openEditTableModal('${t.name}')" class="text-gray-400 hover:text-blue-500 text-sm" title="Edit schema">✏️</button>
            <button onclick="event.stopPropagation(); openRenameTableModal('${t.name}')" class="text-gray-400 hover:text-blue-500 text-sm" title="Rename">🔤</button>
            <button onclick="event.stopPropagation(); openDeleteTableModal('${t.name}')" class="text-gray-400 hover:text-red-500 text-sm" title="Delete">🗑️</button>
          </div>
        </li>
      `).join('');
    }

    function selectTable(name) {
      selectedTable = name;
      localStorage.setItem('selectedTable', name);
      document.getElementById('current-table-name').textContent = name;
      document.getElementById('no-table-selected').classList.add('hidden');
      document.getElementById('data-table-container').classList.remove('hidden');
      document.getElementById('pagination').classList.remove('hidden');
      document.getElementById('bulk-bar').classList.add('hidden');
      selectedRows.clear();
      const meta = allTables.find(t => t.name === name);
      currentColumns = meta ? meta.columns : [];
      currentPage = 1;
      fetchAndRenderRows();
      renderTableList();
    }

    async function fetchAndRenderRows() {
      if (!selectedTable || !activeProjectId) return;
      const limit = rowsPerPage;
      const offset = (currentPage - 1) * limit;
      let url = `${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}?limit=${limit}&offset=${offset}`;
      if (sortColumn) url += `&sort=${sortColumn}&order=${sortAsc ? 'asc' : 'desc'}`;
      const searchQuery = document.getElementById('search-input').value.trim();
      if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;
      activeFilters.forEach((f, i) => {
        url += `&filter[${i}][column]=${encodeURIComponent(f.column)}&filter[${i}][operator]=${f.operator}&filter[${i}][value]=${encodeURIComponent(f.value)}`;
      });
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401) { signOut(); return; }
      currentRows = await res.json();
      totalRows = currentRows.length; // simplified
      renderTable();
      renderPagination();
      updateBulkBar();
    }

    function renderPagination() {
      const totalPages = Math.ceil(totalRows / rowsPerPage);
      const start = totalRows === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
      const end = Math.min(currentPage * rowsPerPage, totalRows);
      document.getElementById('page-start').textContent = start;
      document.getElementById('page-end').textContent = end;
      document.getElementById('total-rows').textContent = totalRows;
      const pageNumbers = document.getElementById('page-numbers');
      pageNumbers.innerHTML = '';
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `px-3 py-1 border rounded text-sm ${i === currentPage ? 'bg-[#091747] text-white' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}`;
        btn.onclick = () => { currentPage = i; fetchAndRenderRows(); };
        pageNumbers.appendChild(btn);
      }
    }

    function prevPage() { if (currentPage > 1) { currentPage--; fetchAndRenderRows(); } }
    function nextPage() { const totalPages = Math.ceil(totalRows / rowsPerPage); if (currentPage < totalPages) { currentPage++; fetchAndRenderRows(); } }
    function changeRowsPerPage() { rowsPerPage = parseInt(document.getElementById('rows-per-page').value); currentPage = 1; fetchAndRenderRows(); }

    function toggleSelectAll(source) {
      const checkboxes = document.querySelectorAll('.row-checkbox');
      checkboxes.forEach(cb => {
        cb.checked = source.checked;
        const id = cb.dataset.id;
        if (source.checked) selectedRows.add(id);
        else selectedRows.delete(id);
      });
      updateBulkBar();
    }

    function toggleRowSelection(id, checked) { if (checked) selectedRows.add(id); else selectedRows.delete(id); updateBulkBar(); }

    function updateBulkBar() {
      const count = selectedRows.size;
      document.getElementById('selected-count').textContent = count;
      document.getElementById('total-row-count').textContent = currentRows.length;
      document.getElementById('bulk-bar').classList.toggle('hidden', count === 0);
    }

    async function bulkDelete() {
      if (selectedRows.size === 0) return;
      if (!confirm(`Delete ${selectedRows.size} row(s)?`)) return;
      const ids = Array.from(selectedRows);
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}/bulk/delete`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ ids })
      });
      if (res.ok) { selectedRows.clear(); fetchAndRenderRows(); showToast('Deleted'); }
      else { const err = await res.json(); showToast(err.error || 'Failed', true); }
    }

    async function bulkDuplicate() {
      if (selectedRows.size === 0) return;
      const ids = Array.from(selectedRows);
      for (const id of ids) {
        const row = currentRows.find(r => r.id == id);
        if (!row) continue;
        const body = {};
        currentColumns.forEach(c => { if (row[c.name] !== undefined) body[c.name] = row[c.name]; });
        await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(body)
        });
      }
      selectedRows.clear();
      fetchAndRenderRows();
      showToast('Duplicated');
    }

    function openBulkEditModal() {
      if (selectedRows.size === 0) return;
      const colSelect = document.getElementById('bulk-edit-column');
      colSelect.innerHTML = currentColumns.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
      document.getElementById('bulk-edit-value').value = '';
      document.getElementById('bulk-edit-modal').classList.add('active');
    }

    async function confirmBulkEdit() {
      const field = document.getElementById('bulk-edit-column').value;
      const value = document.getElementById('bulk-edit-value').value;
      const ids = Array.from(selectedRows);
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}/bulk/update`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ ids, field, value })
      });
      if (res.ok) { selectedRows.clear(); closeModal('bulk-edit-modal'); fetchAndRenderRows(); showToast('Updated'); }
      else { const err = await res.json(); showToast(err.error || 'Failed', true); }
    }

    function renderTable() {
      const thead = document.getElementById('table-head');
      const tbody = document.getElementById('table-body');
      if (!selectedTable) return;
      const allCols = ['id', ...currentColumns.filter(c => c.name !== 'password').map(c => c.name)];
      thead.innerHTML = `<tr class="bg-[#091747] text-white text-sm">
        <th class="px-3 py-3 text-center"><input type="checkbox" class="row-select-all" onchange="toggleSelectAll(this)" /></th>
        <th class="px-3 py-3 text-left text-xs font-semibold uppercase tracking-wider">Actions</th>
        ${allCols.map(c => `<th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider" onclick="sortTable('${c}')">${c} ${sortColumn === c ? (sortAsc?'▲':'▼') : '⇅'}</th>`).join('')}
      </tr>`;
      tbody.innerHTML = currentRows.length === 0 
        ? `<tr><td colspan="${allCols.length+2}" class="px-4 py-6 text-center text-[#57636C] dark:text-[#95A1AC]">No rows yet. Click 'Add Row' to create one.</td></tr>`
        : currentRows.map((row, idx) => `
          <tr class="${idx % 2 === 0 ? 'bg-[#F1F4F8] dark:bg-[#1A1F24]' : 'bg-white dark:bg-[#101213]'} hover:bg-gray-50 dark:hover:bg-gray-700 transition">
            <td class="px-3 py-3 text-center">
              <input type="checkbox" class="row-checkbox" data-id="${row.id}" 
                ${selectedRows.has(row.id.toString()) ? 'checked' : ''}
                onchange="toggleRowSelection('${row.id}', this.checked)" />
            </td>
            <td class="px-3 py-3 relative">
              <button onclick="toggleActionsDropdown(event,'${row.id}')" class="text-[#57636C] dark:text-[#95A1AC] hover:text-[#101213] dark:hover:text-white text-lg">⋯</button>
              <div id="actions-${row.id}" class="action-dropdown" style="min-width:100px;">
                <button onclick="duplicateRow('${row.id}')" class="block w-full text-left px-3 py-1 text-sm hover:bg-gray-100 dark:hover:bg-gray-600 transition">Duplicate</button>
                <button onclick="deleteRow('${row.id}')" class="block w-full text-left px-3 py-1 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-600 transition">Delete</button>
              </div>
            </td>
            ${allCols.map(c => `<td class="px-4 py-3 text-sm cursor-pointer" onclick="showEditPopup(this,'${row.id}','${c}')">${escapeHtml(row[c] ?? '')}</td>`).join('')}
          </tr>`).join('');
    }

    function showEditPopup(cell, rowId, colName) {
      document.querySelectorAll('.edit-popup').forEach(p => p.remove());
      const oldValue = cell.textContent;
      const colMeta = currentColumns.find(c => c.name === colName);
      const type = colMeta ? colMeta.type : 'string';
      let inputHtml = '';
      if (['int','int8','integer','float','number'].includes(type)) {
        inputHtml = `<input type="number" id="edit-popup-input" class="w-full border border-[#324380] rounded px-2 py-1 text-sm dark:bg-[#1A1F24] dark:text-white outline-none" value="${escapeHtml(oldValue)}" />`;
      } else if (['date','datetime'].includes(type)) {
        inputHtml = `<input type="date" id="edit-popup-input" class="w-full border border-[#324380] rounded px-2 py-1 text-sm dark:bg-[#1A1F24] dark:text-white outline-none" value="${escapeHtml(oldValue)}" />`;
      } else if (type === 'boolean') {
        inputHtml = `<select id="edit-popup-input" class="w-full border border-[#324380] rounded px-2 py-1 text-sm dark:bg-[#1A1F24] dark:text-white outline-none">
          <option value="true" ${oldValue === 'true' ? 'selected' : ''}>true</option>
          <option value="false" ${oldValue === 'false' ? 'selected' : ''}>false</option>
        </select>`;
      } else {
        inputHtml = `<input id="edit-popup-input" class="w-full border border-[#324380] rounded px-2 py-1 text-sm dark:bg-[#1A1F24] dark:text-white outline-none" value="${escapeHtml(oldValue)}" />`;
      }
      const popup = document.createElement('div');
      popup.className = 'edit-popup';
      popup.innerHTML = `${inputHtml}
        <div class="flex gap-2 mt-2">
          <button onclick="saveEditFromPopup('${rowId}', '${colName}', document.getElementById('edit-popup-input').value, this)" class="text-green-600 hover:text-green-800 text-sm">✅ Save</button>
          <button onclick="this.closest('.edit-popup').remove()" class="text-red-500 hover:text-red-700 text-sm">❌ Cancel</button>
        </div>`;
      cell.appendChild(popup);
      popup.style.display = 'block';
      const input = popup.querySelector('input, select');
      input.focus();
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEditFromPopup(rowId, colName, input.value, popup);
        if (e.key === 'Escape') popup.remove();
      });
      setTimeout(() => {
        document.addEventListener('click', function closePopup(e) {
          if (!popup.contains(e.target) && e.target !== cell) {
            popup.remove();
            document.removeEventListener('click', closePopup);
          }
        });
      }, 0);
    }

    async function saveEditFromPopup(rowId, colName, newValue, popupElement) {
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}/${rowId}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ [colName]: newValue })
      });
      if (res.ok) {
        const updated = await res.json();
        const idx = currentRows.findIndex(r => r.id == rowId);
        if (idx !== -1) currentRows[idx] = updated;
        renderTable();
        showToast('Updated');
      } else {
        const err = await res.json();
        showToast(err.error || 'Update failed', true);
      }
      document.querySelectorAll('.edit-popup').forEach(p => p.remove());
    }

    function toggleActionsDropdown(e, rowId) {
      e.stopPropagation();
      const existing = document.querySelector('.action-dropdown.show');
      if (existing) existing.classList.remove('show');
      const dropdown = document.getElementById(`actions-${rowId}`);
      if (!dropdown) return;
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      dropdown.style.position = 'fixed';
      dropdown.style.left = rect.right + 'px';
      dropdown.style.top = rect.bottom + 'px';
      dropdown.style.zIndex = '100';
      document.body.appendChild(dropdown);
      dropdown.classList.toggle('show');
      if (!dropdown.classList.contains('show')) {
        dropdown.remove();
      } else {
        const handler = (ev) => {
          if (!dropdown.contains(ev.target) && ev.target !== btn) {
            dropdown.classList.remove('show');
            dropdown.remove();
            document.removeEventListener('click', handler);
          }
        };
        setTimeout(() => document.addEventListener('click', handler), 0);
      }
    }

    async function duplicateRow(rowId) {
      const row = currentRows.find(r => r.id == rowId);
      if (!row) return;
      const body = {};
      currentColumns.forEach(c => { if (row[c.name] !== undefined) body[c.name] = row[c.name]; });
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(body)
      });
      if (res.ok) { fetchAndRenderRows(); showToast('Row duplicated'); }
      else { const err = await res.json(); showToast(err.error || 'Duplicate failed', true); }
    }

    async function deleteRow(id) {
      if (!confirm('Delete this row permanently?')) return;
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/data/${selectedTable}/${id}`, {
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) { fetchAndRenderRows(); showToast('Row deleted'); }
      else showToast('Delete failed', true);
    }

    function sortTable(col) {
      if (sortColumn === col) sortAsc = !sortAsc;
      else { sortColumn = col; sortAsc = true; }
      fetchAndRenderRows();
    }

    function applySearch() {
      currentPage = 1;
      fetchAndRenderRows();
    }

    function toggleFilterPanel() {
      const panel = document.getElementById('filter-panel');
      if (panel.style.display === 'block') {
        panel.style.display = 'none';
      } else {
        panel.style.display = 'block';
        renderFilterConditions();
      }
    }

    function renderFilterConditions() {
      const container = document.getElementById('filter-conditions');
      container.innerHTML = activeFilters.map((f, i) => {
        const colMeta = currentColumns.find(c => c.name === f.column);
        const type = colMeta ? colMeta.type : 'string';
        const allowedOps = TYPE_OPERATORS[type] || TYPE_OPERATORS.string;
        return `<div class="flex items-center gap-2">
          <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white filter-col" style="border-color:#324380;" onchange="updateFilterColumn(${i}, this.value)">
            ${currentColumns.map(c => `<option value="${c.name}" ${f.column === c.name ? 'selected' : ''}>${c.name}</option>`).join('')}
          </select>
          <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white filter-op" style="border-color:#324380;" onchange="updateFilterOp(${i}, this.value)">
            ${allowedOps.map(o => `<option value="${o}" ${f.operator === o ? 'selected' : ''}>${OPERATOR_LABELS[o] || o}</option>`).join('')}
          </select>
          <input value="${f.value}" class="border p-1 rounded text-sm flex-1 dark:bg-[#1A1F24] dark:text-white filter-val" style="border-color:#324380;" onchange="updateFilterValue(${i}, this.value)" />
          <button onclick="removeFilterCondition(${i})" class="text-red-400 hover:text-red-600">✕</button>
        </div>`;
      }).join('');
    }

    function updateFilterColumn(idx, col) { activeFilters[idx].column = col; renderFilterConditions(); }
    function updateFilterOp(idx, op) { activeFilters[idx].operator = op; }
    function updateFilterValue(idx, val) { activeFilters[idx].value = val; }

    function addFilterCondition() {
      const firstCol = currentColumns[0]?.name || 'id';
      activeFilters.push({ column: firstCol, operator: 'eq', value: '' });
      renderFilterConditions();
    }

    function removeFilterCondition(index) {
      activeFilters.splice(index, 1);
      renderFilterConditions();
    }

    function applyFilters() {
      currentPage = 1;
      fetchAndRenderRows();
      document.getElementById('filter-panel').style.display = 'none';
    }

    function clearAllFilters() {
      activeFilters = [];
      document.getElementById('search-input').value = '';
      renderFilterConditions();
      currentPage = 1;
      fetchAndRenderRows();
    }

    // ======= TABLE CREATE / EDIT / DELETE =======
    function openCreateTableModal() {
      document.getElementById('new-table-name').value = '';
      document.getElementById('new-columns').innerHTML = '';
      document.getElementById('create-table-error').classList.add('hidden');
      addColumnField();
      document.getElementById('create-table-modal').classList.add('active');
    }

    function addColumnField() {
      const container = document.getElementById('new-columns');
      container.innerHTML += `
        <div class="flex items-center gap-2">
          <input placeholder="Column name" class="column-name w-full border p-2 rounded-lg text-sm focus:ring-2 focus:ring-[#091747] outline-none dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
          <select class="column-type border p-2 rounded-lg text-sm dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" style="border-color:#324380;">
            ${COLUMN_TYPES.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>
          <input placeholder="Default" class="column-default border p-2 rounded-lg text-sm w-24 dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
          <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl">×</button>
        </div>`;
    }

    async function createTable() {
      if (!activeProjectId) return showToast('No project selected', true);
      const name = document.getElementById('new-table-name').value.trim();
      const nameInputs = document.querySelectorAll('.column-name');
      const typeSelects = document.querySelectorAll('.column-type');
      const defaultInputs = document.querySelectorAll('.column-default');
      const cols = [];
      for (let i = 0; i < nameInputs.length; i++) {
        const cn = nameInputs[i].value.trim();
        if (cn) cols.push({ name: cn, type: typeSelects[i].value, default: defaultInputs[i].value });
      }
      if (!name || cols.length === 0) {
        document.getElementById('create-table-error').textContent = 'Name and at least one column required.';
        document.getElementById('create-table-error').classList.remove('hidden');
        return;
      }
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/tables`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name, columns: cols })
      });
      const data = await res.json();
      if (res.ok) {
        closeModal('create-table-modal');
        loadAllTables();
        selectTable(data.name);
        showToast(`Table "${data.name}" created.`);
      } else {
        document.getElementById('create-table-error').textContent = data.error || 'Creation failed';
        document.getElementById('create-table-error').classList.remove('hidden');
      }
    }

    function openDeleteTableModal(name) {
      tableToDelete = name;
      document.getElementById('delete-table-name').textContent = name;
      document.getElementById('delete-confirm-input').value = '';
      document.getElementById('delete-table-error').classList.add('hidden');
      document.getElementById('delete-table-modal').classList.add('active');
    }
    function copyTableName() { navigator.clipboard.writeText(tableToDelete); showToast('Name copied'); }
    async function confirmDeleteTable() {
      if (!activeProjectId) return showToast('No project selected', true);
      if (document.getElementById('delete-confirm-input').value.trim() !== tableToDelete) {
        document.getElementById('delete-table-error').textContent = 'Name does not match.';
        document.getElementById('delete-table-error').classList.remove('hidden');
        return;
      }
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/tables/${tableToDelete}`, {
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        closeModal('delete-table-modal');
        if (selectedTable === tableToDelete) { selectedTable = null; localStorage.removeItem('selectedTable'); }
        loadAllTables();
        showToast('Table deleted');
      } else {
        const err = await res.json();
        document.getElementById('delete-table-error').textContent = err.error || 'Deletion failed';
        document.getElementById('delete-table-error').classList.remove('hidden');
      }
    }
    function openRenameTableModal(name) {
      tableToRename = name;
      document.getElementById('rename-table-input').value = name;
      document.getElementById('rename-table-error').classList.add('hidden');
      document.getElementById('rename-table-modal').classList.add('active');
    }
    async function confirmRenameTable() {
      if (!activeProjectId) return showToast('No project selected', true);
      const newName = document.getElementById('rename-table-input').value.trim();
      if (!newName || newName === tableToRename) {
        document.getElementById('rename-table-error').textContent = 'Enter a different name.';
        document.getElementById('rename-table-error').classList.remove('hidden');
        return;
      }
      showToast('Rename not implemented via API yet', true);
    }

    function openEditTableModal(name) {
      const table = allTables.find(t => t.name === (name || selectedTable));
      if (!table) return;
      document.getElementById('edit-table-name').textContent = table.name;
      const container = document.getElementById('edit-columns');
      const colsToEdit = table.columns.filter(c => c.name !== 'password');
      container.innerHTML = colsToEdit.map(c => `
        <div class="flex items-center gap-2">
          <input value="${c.name}" class="edit-col-name flex-1 border p-2 rounded-lg text-sm dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
          <select class="edit-col-type border p-2 rounded-lg text-sm dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" style="border-color:#324380;">
            ${COLUMN_TYPES.map(t => `<option value="${t}" ${c.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
          <input value="${c.default || ''}" placeholder="Default" class="edit-col-default border p-2 rounded-lg text-sm w-24 dark:bg-[#1A1F24] dark:border-gray-600 dark:text-white" />
          ${(table.name === 'users' && c.name === 'email') ? '<span class="text-gray-400 text-sm">required</span>' : `<button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 text-xl">×</button>`}

      if (cols.length === 0) return showToast('At least one column required', true);
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/tables/${name}/schema`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ columns: cols })

        closeModal('edit-table-modal');

    // ======= PRIVACY (with reference support) =======
    function getAuthColumns() {
      const base = ['Auth.ID', 'Auth.Email'];
      const usersMeta = allTables.find(t => t.name === 'users');
      if (usersMeta) {
        usersMeta.columns.forEach(c => {
          if (c.name !== 'email' && c.name !== 'id' && c.name !== 'password') {
            base.push(`Auth.${c.name}`);
          }
        });
      }
      return base;
    }

    function openPrivacyModal() {
      if (!selectedTable) return;
      document.getElementById('privacy-table-name').textContent = selectedTable;
      const table = allTables.find(t => t.name === selectedTable);
      const priv = table?.privacy || {};
      privacyRules = [];
      const ops = ['read', 'write', 'update', 'delete'];
      ops.forEach(op => {
        if (priv[op]) {
          priv[op].split(' AND ').map(s => s.trim()).forEach(condition => {
            const parts = condition.split(' ');
            const col = parts[0] || '';
            const opVal = parts[1] || 'eq';
            let ref = '';
            let val = '';
            const refMatch = condition.match(/^([^ ]+)\s+([^ ]+)\s+\{([^}]+)\}\s*(.*)/);
            if (refMatch) {
              ref = refMatch[3];
              val = refMatch[4];
            } else {
              val = parts.slice(2).join(' ');
              if (val === '@user_id') ref = 'Auth.ID';
              else if (val === '@user_email') ref = 'Auth.Email';
            }
            const existing = privacyRules.find(r => r.column === col && r.operator === opVal && r.reference === ref && r.values === val);
            if (!existing) {
              privacyRules.push({
                column: col,
                operator: opVal,
                reference: ref,
                values: val,
                columns: { read: [], write: [], update: [], delete: [] }
              });
            }
          });
        }
      });
      const colPerms = table?.column_permissions || {};
      privacyRules.forEach(rule => {
        rule.columns = {
          read: colPerms.read ? [...colPerms.read] : [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          write: colPerms.write ? [...colPerms.write] : [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          update: colPerms.update ? [...colPerms.update] : [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          delete: colPerms.delete ? [...colPerms.delete] : []
        };
      });
      if (privacyRules.length === 0) {
        privacyRules.push({
          column: currentColumns.filter(c => c.name !== 'password')[0]?.name || 'id',
          operator: 'eq',
          reference: 'Auth.ID',
          values: '',
          columns: {
            read: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
            write: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
            update: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
            delete: []
          }
        });
      }
      renderPrivacyCards();
      document.getElementById('privacy-modal').classList.add('active');
    }

    function renderPrivacyCards() {
      const container = document.getElementById('privacy-rules-container');
      const allCols = ['id', ...currentColumns.filter(c => c.name !== 'password').map(c => c.name)];
      const authOpts = getAuthColumns().map(a => `<option value="${a}">${a}</option>`).join('');
      const dbOpts = allTables.map(t => {
        return t.columns.filter(c => c.name !== 'password').map(c => `<option value="${t.name}.${c.name}">${t.name}.${c.name}</option>`).join('');
      }).join('');
      const referenceOptions = `<optgroup label="Authentication">${authOpts}</optgroup><optgroup label="Database Tables">${dbOpts}</optgroup>`;

      container.innerHTML = privacyRules.map((rule, idx) => {
        const showValues = rule.reference && rule.reference.includes('.');
        const allRead = allCols.every(c => rule.columns.read.includes(c));
        const allWrite = allCols.every(c => rule.columns.write.includes(c));
        const allUpdate = allCols.every(c => rule.columns.update.includes(c));
        const allDelete = allCols.every(c => rule.columns.delete.includes(c));

        return `
        <div class="privacy-rule-card">
          <div class="flex flex-wrap items-center gap-2 mb-3">
            <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" onchange="updatePrivacyColumn(${idx}, this.value)">
              ${allCols.map(c => `<option value="${c}" ${rule.column === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" onchange="updatePrivacyOperator(${idx}, this.value)">
              ${OPERATORS.map(o => `<option value="${o}" ${rule.operator === o ? 'selected' : ''}>${OPERATOR_LABELS[o] || o}</option>`).join('')}
            </select>
            <select class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" onchange="updatePrivacyReference(${idx}, this.value)">
              ${referenceOptions.replace(new RegExp(`value="${rule.reference}"`, 'g'), `value="${rule.reference}" selected`)}
            </select>
            ${showValues ? `
            <input class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white flex-1 min-w-[150px]" 
                   value="${rule.values || ''}" 
                   placeholder="Specific Values (optional)" 
                   onchange="updatePrivacyValues(${idx}, this.value)" />
            <small class="text-xs text-gray-400 w-full">Separate multiple values with commas. Example: admin,user,manager</small>
            ` : ''}
            <button onclick="deletePrivacyRule(${idx})" class="text-red-400 hover:text-red-600 ml-auto">✕</button>
          </div>
          <table class="mini-perms-table">
            <thead>
              <tr>
                <th>Column</th>
                <th>Read <input type="checkbox" onchange="checkAllPerms(this, 'read', ${idx})" ${allRead ? 'checked' : ''}></th>
                <th>Write <input type="checkbox" onchange="checkAllPerms(this, 'write', ${idx})" ${allWrite ? 'checked' : ''}></th>
                <th>Update <input type="checkbox" onchange="checkAllPerms(this, 'update', ${idx})" ${allUpdate ? 'checked' : ''}></th>
                <th class="opacity-70">Delete <input type="checkbox" onchange="checkAllPerms(this, 'delete', ${idx})" ${allDelete ? 'checked' : ''}></th>
              </tr>
            </thead>
            <tbody>
              ${allCols.map(c => `
                <tr>
                  <td>${c}</td>
                  <td><input type="checkbox" ${rule.columns.read.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','read',${idx}, this.checked)"></td>
                  <td><input type="checkbox" ${rule.columns.write.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','write',${idx}, this.checked)"></td>
                  <td><input type="checkbox" ${rule.columns.update.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','update',${idx}, this.checked)"></td>
                  <td class="opacity-70"><input type="checkbox" ${rule.columns.delete.includes(c) ? 'checked' : ''} onchange="toggleRuleColumn('${c}','delete',${idx}, this.checked)"></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
      }).join('');
    }

    function checkAllPerms(cb, op, idx) {
      const allCols = ['id', ...currentColumns.filter(c => c.name !== 'password').map(c => c.name)];
      allCols.forEach(col => toggleRuleColumn(col, op, idx, cb.checked));
      renderPrivacyCards();
    }

    function addPrivacyRuleCard() {
      privacyRules.push({
        column: currentColumns.filter(c => c.name !== 'password')[0]?.name || 'id',
        operator: 'eq',
        reference: 'Auth.ID',
        values: '',
        columns: {
          read: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          write: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          update: [...currentColumns.filter(c => c.name !== 'password').map(c=>c.name), 'id'],
          delete: []
        }
      });
      renderPrivacyCards();
    }

    function toggleRuleColumn(col, op, idx, checked) {
      const arr = privacyRules[idx].columns[op];
      if (checked) { if (!arr.includes(col)) arr.push(col); }
      else { privacyRules[idx].columns[op] = arr.filter(c => c !== col); }
    }

    function updatePrivacyColumn(idx, val) { privacyRules[idx].column = val; }
    function updatePrivacyOperator(idx, op) { privacyRules[idx].operator = op; }
    function updatePrivacyReference(idx, ref) { privacyRules[idx].reference = ref; renderPrivacyCards(); }
    function updatePrivacyValues(idx, val) { privacyRules[idx].values = val; }

    function deletePrivacyRule(idx) { privacyRules.splice(idx,1); renderPrivacyCards(); }

    async function savePrivacyRules() {
      if (!activeProjectId) return showToast('No project selected', true);
      const payload = { read: '', write: '', update: '', delete: '', column_permissions: { read: [], write: [], update: [], delete: [] } };
      ['read','write','update','delete'].forEach(op => {
        const conditions = privacyRules.filter(r => r.columns[op].length > 0).map(r => {
          let valuePart;
          if (r.reference === 'Auth.ID') valuePart = `{Auth.ID} @user_id`;
          else if (r.reference === 'Auth.Email') valuePart = `{Auth.Email} @user_email`;
          else if (r.reference && r.reference.includes('.')) valuePart = `{${r.reference}} ${r.values || ''}`;
          else if (r.reference) valuePart = `{${r.reference}} ${r.values || ''}`;
          else valuePart = r.values || '';
          if (!valuePart) return '';
          return `${r.column} ${r.operator} ${valuePart}`;
        }).filter(Boolean);
        payload[op] = conditions.join(' AND ');
      });
      const globalCols = { read: new Set(), write: new Set(), update: new Set(), delete: new Set() };
      privacyRules.forEach(rule => {
        ['read','write','update','delete'].forEach(op => {
          rule.columns[op].forEach(c => globalCols[op].add(c));
        });
      });
      payload.column_permissions = {
        read: Array.from(globalCols.read),
        write: Array.from(globalCols.write),
        update: Array.from(globalCols.update),
        delete: Array.from(globalCols.delete)
      };
      await fetch(`${API_BASE}/api/project/${activeProjectId}/tables/${selectedTable}/privacy`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(payload)
      });
      closeModal('privacy-modal');
      loadAllTables();
      showToast('Privacy rules saved');
    }

            <p class="text-sm text-[#57636C] dark:text-[#95A1AC] mb-3">${m.desc}</p>
            <details class="mb-2">
              <summary class="text-sm text-[#101213] dark:text-white cursor-pointer">cURL</summary>
              <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-1 overflow-x-auto relative"><code id="auth-curl-${m.method}">...</code><button onclick="copyText(document.getElementById('auth-curl-${m.method}').textContent, this)" class="absolute top-2 right-2 text-xs brand-btn px-2 py-1 rounded">📋 Copy</button></pre>
            </details>
            <details>
              <summary class="text-sm text-[#101213] dark:text-white cursor-pointer">Node.js</summary>
              <pre class="bg-gray-900 text-gray-100 p-3 rounded-lg mt-1 overflow-x-auto relative"><code id="auth-node-${m.method}">...</code><button onclick="copyText(document.getElementById('auth-node-${m.method}').textContent, this)" class="absolute top-2 right-2 text-xs brand-btn px-2 py-1 rounded">📋 Copy</button></pre>
            </details>
          </div>`;
        }).join('')}
      `;
      updateAuthApiSnippets();
      document.getElementById('auth-api-modal').classList.add('active');
    }

    function updateAuthApiSnippets() {
      const keyEl = document.getElementById('auth-api-key-selector');
      const tokenDisplay = keyEl ? keyEl.value : 'YOUR_TOKEN';
      const base = API_BASE;
      const methods = [
        { method: 'POST', url: `/api/project/${activeProjectId}/auth/register`, desc: 'Register a new project user' },
        { method: 'POST', url: `/api/project/${activeProjectId}/auth/login`, desc: 'Login as project user' },
        { method: 'GET', url: `/api/project/${activeProjectId}/users`, desc: 'List all project users' },
        { method: 'PUT', url: `/api/project/${activeProjectId}/users/:id`, desc: 'Update a user' },
        { method: 'DELETE', url: `/api/project/${activeProjectId}/users/:id`, desc: 'Delete a user' }
      ];
      methods.forEach(m => {
        const curlEl = document.getElementById(`auth-curl-${m.method}`);
        const nodeEl = document.getElementById(`auth-node-${m.method}`);
        if (!curlEl || !nodeEl) return;
        if (m.method === 'GET') {
          curlEl.textContent = `curl "${base}${m.url}" \\\n  -H "Authorization: Bearer ${tokenDisplay}"`;
          nodeEl.textContent = `const res = await fetch('${base}${m.url}', {\n  headers: { 'Authorization': 'Bearer ${tokenDisplay}' }\n});\nconst data = await res.json();`;
        } else if (m.method === 'POST' && m.url.includes('/auth/register')) {
          curlEl.textContent = `curl -X POST "${base}${m.url}" \\\n  -H "Authorization: Bearer ${tokenDisplay}" \\\n  -H "Content-Type: application/json" \\\n  -d '{"email":"user@example.com","password":"password"}'`;
          nodeEl.textContent = `const res = await fetch('${base}${m.url}', {\n  method: 'POST',\n  headers: { 'Authorization': 'Bearer ${tokenDisplay}', 'Content-Type': 'application/json' },\n  body: JSON.stringify({email:'user@example.com',password:'password'})\n});\nconst data = await res.json();`;
        } else if (m.method === 'POST' && m.url.includes('/auth/login')) {
          curlEl.textContent = `curl -X POST "${base}${m.url}" \\\n  -H "Content-Type: application/json" \\\n  -d '{"email":"user@example.com","password":"password"}'`;
          nodeEl.textContent = `const res = await fetch('${base}${m.url}', {\n  method: 'POST',\n  headers: { 'Content-Type': 'application/json' },\n  body: JSON.stringify({email:'user@example.com',password:'password'})\n});\nconst data = await res.json();`;
        } else {
          curlEl.textContent = `curl -X ${m.method} "${base}${m.url}" \\\n  -H "Authorization: Bearer ${tokenDisplay}" \\\n  -H "Content-Type: application/json" \\\n  -d '{}'`;
          nodeEl.textContent = `const res = await fetch('${base}${m.url}', {\n  method: '${m.method}',\n  headers: { 'Authorization': 'Bearer ${tokenDisplay}', 'Content-Type': 'application/json' },\n  body: JSON.stringify({})\n});\nconst data = await res.json();`;
        }
      });
    }

    function fetchKeysAndUpdateAuth() {
      fetch(`${API_BASE}/api/auth-keys`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          anonKeyValue = data.anonKey || '';
          adminKeyValue = data.adminKey || '';
          openAuthApiModal();
        })
        .catch(() => showToast('Failed to fetch keys', true));
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = '📋 Copy', 2000);
      });
    }

    // ======= WEBHOOKS (adapted for projects) =======
    async function openWebhooksModal() {
      if (!selectedTable || !activeProjectId) return;
      document.getElementById('webhooks-table-name').textContent = selectedTable;
      loadWebhooksTable();
      document.getElementById('webhooks-modal').classList.add('active');
    }

    async function loadWebhooksTable() {
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/webhooks/${selectedTable}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const hooks = await res.json();
      const tbody = document.getElementById('webhooks-table-body');
      tbody.innerHTML = hooks.length ? hooks.map(h => `
        <tr class="border dark:border-gray-600">
          <td class="px-3 py-2 text-sm">${escapeHtml(h.name || 'Unnamed')}</td>
          <td class="px-3 py-2 text-sm">${escapeHtml(h.url)}</td>
          <td class="px-3 py-2 text-sm">${h.events.join(', ')}</td>
          <td class="px-3 py-2 text-center text-sm">
            <button onclick="editWebhook(${h.id})" class="text-blue-500 hover:text-blue-700 mr-2">✏️</button>
            <button onclick="deleteWebhook(${h.id})" class="text-red-500 hover:text-red-700">🗑️</button>
          </td>
        </tr>
      `).join('') : '<tr><td colspan="4" class="px-3 py-4 text-center text-[#57636C] dark:text-[#95A1AC] text-sm">No webhooks yet.</td></tr>';
    }

    function openWebhookFormModal(editId = null) {
      webhookEditingId = editId;
      document.getElementById('webhook-form-title').textContent = editId ? 'Edit Webhook' : 'Add Webhook';
      document.getElementById('webhook-name').value = '';
      document.getElementById('webhook-url').value = '';
      document.querySelectorAll('.webhook-event-cb').forEach(cb => cb.checked = false);
      webhookHeaders = [];
      renderWebhookHeaders();

      if (editId) {
        fetch(`${API_BASE}/api/project/${activeProjectId}/webhooks/${selectedTable}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(r => r.json())
        .then(hooks => {
          const hook = hooks.find(h => h.id == editId);
          if (hook) {
            document.getElementById('webhook-name').value = hook.name || '';
            document.getElementById('webhook-url').value = hook.url || '';
            document.querySelectorAll('.webhook-event-cb').forEach(cb => { cb.checked = hook.events.includes(cb.value); });
            webhookHeaders = hook.headers ? [...hook.headers] : [];
            renderWebhookHeaders();
          }
        });
      }

      document.getElementById('webhook-form-modal').classList.add('active');
    }

    function addWebhookHeader() { webhookHeaders.push({ key: '', value: '' }); renderWebhookHeaders(); }

    function renderWebhookHeaders() {
      const container = document.getElementById('webhook-headers');
      container.innerHTML = webhookHeaders.map((h, i) => `
        <div class="webhook-header-row">
          <input placeholder="Key" class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" style="min-width:0; flex:1 1 auto;" value="${h.key}" onchange="webhookHeaders[${i}].key = this.value" />
          <input placeholder="Value" class="border p-1 rounded text-sm dark:bg-[#1A1F24] dark:text-white" style="min-width:0; flex:1 1 auto;" value="${h.value}" onchange="webhookHeaders[${i}].value = this.value" />
          <button onclick="webhookHeaders.splice(${i},1); renderWebhookHeaders()" class="text-red-400 hover:text-red-600 flex-shrink-0">✕</button>
        </div>
      `).join('');
    }

    async function saveWebhook() {
      const name = document.getElementById('webhook-name').value.trim();
      const url = document.getElementById('webhook-url').value.trim();
      const events = Array.from(document.querySelectorAll('.webhook-event-cb:checked')).map(cb => cb.value);
      const headers = webhookHeaders.filter(h => h.key);
      if (!url || events.length === 0) return showToast('URL and at least one event required', true);

      if (webhookEditingId) {
        await fetch(`${API_BASE}/api/project/${activeProjectId}/webhooks/${webhookEditingId}`, {
          method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
        });
      }
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/webhooks/${selectedTable}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name, url, events, headers })
      });
      if (res.ok) {
        closeModal('webhook-form-modal');
        loadWebhooksTable();
        showToast(webhookEditingId ? 'Webhook updated' : 'Webhook added');
        webhookEditingId = null;
      } else {
        const err = await res.json();
        showToast(err.error || 'Failed', true);
      }
    }

    async function editWebhook(id) { openWebhookFormModal(id); }

    async function deleteWebhook(id) {
      if (!confirm('Delete this webhook?')) return;
      const res = await fetch(`${API_BASE}/api/project/${activeProjectId}/webhooks/${id}`, {
        method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) { loadWebhooksTable(); showToast('Webhook deleted'); }
      else showToast('Failed', true);
    }

    // ======= LOGS =======
    function toggleLogsModal() { document.getElementById('logs-modal').classList.toggle('active'); }
    function appendLog(msg) {
      const logDiv = document.getElementById('logs-content');
      const p = document.createElement('p');
      p.className = 'text-xs border-b pb-1 mb-1 dark:border-gray-600 dark:text-[#95A1AC]';
      p.textContent = msg;
      logDiv.prepend(p);
      if (logDiv.children.length > 50) logDiv.lastChild.remove();
    }

    // ======= EXPORT CSV =======
    function exportCSV() {
      if (!selectedTable || !currentRows.length) return showToast('No data', true);
      const cols = ['id', ...currentColumns.filter(c => c.name !== 'password').map(c=>c.name)];
      const csv = cols.join(',') + '\n' + currentRows.map(r => cols.map(c => `"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${selectedTable}.csv`;
      a.click();
      showToast('CSV exported');
    }

    // ======= WEBSOCKET =======
    function connectWebSocket() {
      if (ws) ws.close();
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token }));
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'item_change') {
          let text = `[${msg.table}] ${msg.event}: `;
          if (msg.event === 'update') text += `old=${JSON.stringify(msg.old)} → new=${JSON.stringify(msg.new)}`;
          else if (msg.event === 'delete') text += `old=${JSON.stringify(msg.old)}`;
          else text += `new=${JSON.stringify(msg.new)}`;
          appendLog(text);
          if (msg.table === selectedTable && activeProjectId == msg.projectId) fetchAndRenderRows();
        }
      };
      ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }

    // ======= HELPERS =======
    function escapeHtml(text) {
      if (text === null || text === undefined) return '';
      return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    window.addEventListener('click', e => {
      if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('active');
    });
  </script>
</body>
</html>

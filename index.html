<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Database Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#091747',
            secondary: '#324380',
          }
        }
      }
    }
    // Set dark mode from stored preference or system
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    th { cursor: pointer; user-select: none; }
    th:hover { background-color: rgba(0,0,0,0.05); }
    .dark th:hover { background-color: rgba(255,255,255,0.05); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
    .modal-overlay.active { display: flex; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 h-screen flex transition-colors">

  <!-- Auth Container -->
  <div id="auth-container" class="w-full max-w-md mx-auto mt-20 p-6 bg-white dark:bg-gray-800 rounded-xl shadow-xl space-y-4">
    <h1 class="text-2xl font-bold text-center text-gray-800 dark:text-white">My Database</h1>
    <input type="email" id="email" placeholder="Email" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
    <input type="password" id="password" placeholder="Password" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-brand outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white" />
    <div class="flex gap-2">
      <button onclick="signUp()" class="flex-1 bg-brand text-white py-3 rounded-lg font-semibold hover:bg-secondary transition">Sign Up</button>
      <button onclick="signIn()" class="flex-1 bg-brand text-white py-3 rounded-lg font-semibold hover:bg-secondary transition">Sign In</button>
    </div>
    <p id="auth-message" class="text-sm text-red-500 text-center"></p>
  </div>

  <!-- Main App -->
  <div id="app-container" class="flex flex-1 h-screen hidden">
    <!-- Sidebar -->
    <div class="w-60 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col shadow-sm">
      <div class="p-4 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-bold text-lg text-gray-800 dark:text-white">Tables</h2>
          <button onclick="openCreateTableModal()" class="bg-brand hover:bg-secondary text-white w-7 h-7 rounded-full flex items-center justify-center text-xl leading-none transition">+</button>
        </div>
        <ul id="table-list" class="space-y-1"></ul>
      </div>
      <div class="mt-auto p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
        <button onclick="toggleDarkMode()" class="w-full text-left text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 px-2 py-1 rounded" id="theme-toggle">🌓 Dark mode</button>
        <button onclick="signOut()" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 py-2 rounded-lg text-gray-600 dark:text-gray-200 font-medium transition">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Top Bar -->
      <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-6 py-3 flex items-center justify-between shadow-sm">
        <h1 id="current-table-name" class="text-xl font-semibold text-gray-800 dark:text-white">Select a table</h1>
        <div class="flex items-center gap-3 flex-wrap">
          <button onclick="openEditTableModal()" class="px-3 py-1.5 text-sm border-2 border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">Edit Table</button>
          <button onclick="openAddRowModal()" class="px-3 py-1.5 text-sm bg-brand text-white rounded-lg hover:bg-secondary transition">Add Row</button>
          <button onclick="openPrivacyModal()" class="px-3 py-1.5 text-sm border-2 border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">Privacy</button>
          <button onclick="openApiModal()" class="px-3 py-1.5 text-sm border-2 border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">API</button>
          <button onclick="openWebhooksModal()" class="px-3 py-1.5 text-sm border-2 border-secondary text-secondary rounded-lg hover:bg-secondary hover:text-white transition">Webhooks</button>
          <button onclick="exportCSV()" class="px-3 py-1.5 text-sm bg-brand text-white rounded-lg hover:bg-secondary transition border-2 border-brand">Export CSV</button>
          <div class="relative">
            <button onclick="toggleLogsModal()" class="text-gray-600 dark:text-gray-300 hover:text-brand transition text-xl">🔔</button>
          </div>
          <div class="relative">
            <button id="user-menu-button" class="flex items-center space-x-2 text-gray-700 dark:text-gray-300 hover:text-brand transition">
              <span class="text-xl">👤</span>
              <span id="user-email-display" class="hidden sm:inline text-sm"></span>
            </button>
            <div id="user-menu-dropdown" class="user-menu">
              <div class="p-3 border-b dark:border-gray-600">
                <p class="text-sm text-gray-500 dark:text-gray-400">Signed in as</p>
                <p id="user-email-full" class="text-sm font-medium text-gray-800 dark:text-white truncate"></p>
              </div>
              <button onclick="signOut()" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition">Sign out</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Table Area -->
      <div class="flex-1 overflow-auto p-6">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden hidden" id="data-table-container">
          <table class="w-full" id="data-table">
            <thead id="table-head" class="bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-sm"></thead>
            <tbody id="table-body" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
          </table>
        </div>
        <div id="no-table-selected" class="text-center text-gray-400 dark:text-gray-500 mt-16 text-lg">Select a table from the left to view its data.</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg z-50 hidden transition-all"></div>

  <!-- ============= MODALS ============= -->
  <!-- (Keep all previous modals: create-table, delete-table, rename-table, add-row, privacy, api, webhooks, logs) -->

  <!-- ... (the full file with all modals and JavaScript continues) ... -->

</body>
</html>

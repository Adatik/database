<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Own DB App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div id="app" class="w-full max-w-2xl bg-white rounded-xl shadow-2xl p-6">

    <!-- Auth Container -->
    <div id="auth-container" class="space-y-4">
      <h1 class="text-2xl font-bold text-center">Welcome</h1>
      <input type="email" id="email" placeholder="Email" class="w-full border p-2 rounded" />
      <input type="password" id="password" placeholder="Password" class="w-full border p-2 rounded" />
      <div class="flex gap-2">
        <button onclick="signUp()" class="flex-1 bg-green-500 text-white py-2 rounded hover:bg-green-600">Sign Up</button>
        <button onclick="signIn()" class="flex-1 bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Sign In</button>
      </div>
      <p id="auth-message" class="text-sm text-red-600 text-center"></p>
    </div>

    <!-- Main App (hidden until authenticated) -->
    <div id="main-container" class="hidden space-y-6">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold">Your Items</h2>
        <button onclick="signOut()" class="bg-gray-300 px-4 py-1 rounded hover:bg-gray-400">Logout</button>
      </div>

      <div class="flex gap-2">
        <input type="text" id="new-title" placeholder="New item title" class="flex-1 border p-2 rounded" />
        <button onclick="addItem()" class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600">Add</button>
      </div>

      <ul id="items-list" class="space-y-2"></ul>

      <!-- Real‑Time Change Log (old → new) -->
      <div class="border-t pt-4">
        <h3 class="font-semibold mb-2">Real‑Time Change Log (old → new)</h3>
        <div id="change-log" class="bg-gray-50 p-3 rounded max-h-48 overflow-y-auto text-sm space-y-1"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let token = localStorage.getItem('token');
    let ws = null;
    const itemsCache = new Map();

    function showAuthMessage(msg) { document.getElementById('auth-message').textContent = msg; }
    function showAuth() {
      document.getElementById('auth-container').classList.remove('hidden');
      document.getElementById('main-container').classList.add('hidden');
    }
    function showApp() {
      document.getElementById('auth-container').classList.add('hidden');
      document.getElementById('main-container').classList.remove('hidden');
      loadItems();
      connectWebSocket();
    }

    // -------- Auth ----------
    async function signUp() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        token = data.token;
        showApp();
      } else {
        showAuthMessage(data.error);
      }
    }

    async function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        token = data.token;
        showApp();
      } else {
        showAuthMessage(data.error);
      }
    }

    function signOut() {
      localStorage.removeItem('token');
      token = null;
      if (ws) ws.close();
      itemsCache.clear();
      showAuth();
    }

    // -------- Items CRUD ----------
    async function loadItems() {
      const res = await fetch(`${API_BASE}/api/items`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const items = await res.json();
      itemsCache.clear();
      items.forEach(item => itemsCache.set(item.id, item));
      renderItems(items);
    }

    function renderItems(items) {
      const list = document.getElementById('items-list');
      list.innerHTML = items.map(item => `
        <li class="flex justify-between items-center bg-gray-50 p-3 rounded">
          <span>${escapeHtml(item.title)}</span>
          <button onclick="deleteItem(${item.id})" class="text-red-500 hover:underline">Delete</button>
        </li>
      `).join('');
    }

    async function addItem() {
      const title = document.getElementById('new-title').value.trim();
      if (!title) return;
      const res = await fetch(`${API_BASE}/api/items`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title })
      });
      if (res.ok) {
        document.getElementById('new-title').value = '';
      } else {
        const data = await res.json();
        alert(data.error);
      }
    }

    async function deleteItem(id) {
      const res = await fetch(`${API_BASE}/api/items/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) alert('Delete failed');
    }

    // -------- Real‑Time (WebSocket) ----------
    function connectWebSocket() {
      if (ws) ws.close();
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token }));
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'item_change') handleRealtimeChange(msg);
      };
      ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }

    function handleRealtimeChange({ event, old: oldRecord, new: newRecord }) {
      const logDiv = document.getElementById('change-log');
      let message = '';

      switch (event) {
        case 'insert':
          message = `INSERT: New = ${JSON.stringify(newRecord)}`;
          itemsCache.set(newRecord.id, newRecord);
          break;
        case 'update':
          message = `UPDATE: Old = ${JSON.stringify(oldRecord)} → New = ${JSON.stringify(newRecord)}`;
          itemsCache.set(newRecord.id, newRecord);
          break;
        case 'delete':
          message = `DELETE: Old = ${JSON.stringify(oldRecord)}`;
          itemsCache.delete(oldRecord.id);
          break;
      }

      const p = document.createElement('p');
      p.className = 'border-b pb-1';
      p.textContent = message;
      logDiv.prepend(p);

      renderItems(Array.from(itemsCache.values()));
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // -------- Init ----------
    window.addEventListener('load', () => {
      if (token) showApp(); else showAuth();
    });
  </script>
</body>
</html>
